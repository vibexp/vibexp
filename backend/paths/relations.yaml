# Typed resource relations path items (epic #421) — referenced from
# ../openapi.yaml. Team-scoped under /api/v1/{team_id}/relations; the resource a
# list is requested for is identified by resource_type + resource_id query params
# (same shape as comments/attachments).

api-v1-team_id-relations:
  get:
    summary: List a resource's relations
    description: >
      Returns a page of the relations touching the given resource — both
      directions (the resource as subject or as object) — newest first, each
      enriched with the other endpoint's resolved title. The caller must be a
      member of the team.
    operationId: listRelations
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: resource_type
        in: query
        required: true
        description: Type of the resource whose relations to list (artifact, memory, prompt, or blueprint)
        schema:
          type: string
      - name: resource_id
        in: query
        required: true
        description: Identifier of the resource whose relations to list
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        description: Page number (1-based)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Relations retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/RelationListResponse'
      '400':
        description: Invalid resource_type or query parameters
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller is not a member of the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to list relations
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Relations

  post:
    summary: Create a relation
    description: >
      Creates a typed edge between two resources. Any team member may create a
      relation; both endpoints must exist in the team and share a project, and
      the object type must satisfy the relation-type matrix. Creation is
      idempotent — a duplicate edge returns the existing row with 200 instead of
      201.
    operationId: createRelation
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateRelationRequest'
    responses:
      '200':
        description: Relation already existed; the existing edge is returned (idempotent create)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Relation'
      '201':
        description: Relation created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Relation'
      '400':
        description: Invalid types, self-link, cross-project link, or matrix violation
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not create relations in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: One of the endpoints does not exist in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to create relation
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Relations

api-v1-team_id-relations-relation_id-confirm:
  post:
    summary: Confirm a suggested relation
    description: >
      Promotes a suggested relation to confirmed, recording the caller as the
      confirmer. Requires permission to update any resource in the team.
      Confirming an already-confirmed relation returns 409.
    operationId: confirmRelation
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: relation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Relation identifier
    responses:
      '200':
        description: Relation confirmed successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Relation'
      '400':
        description: relation_id is not a valid UUID
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not confirm relations in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Relation not found in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '409':
        description: Relation is already confirmed
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to confirm relation
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Relations

api-v1-team_id-relations-relation_id:
  delete:
    summary: Delete a relation
    description: >
      Deletes a relation. The creator may delete their own; a team admin or owner
      may delete any relation.
    operationId: deleteRelation
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: relation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Relation identifier
    responses:
      '204':
        description: Relation deleted (no content)
      '400':
        description: relation_id is not a valid UUID
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not delete this relation
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Relation not found in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to delete relation
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Relations

api-v1-team_id-relations-seed:
  post:
    summary: Seed suggested relations from embedding similarity
    description: >
      Triggers a one-shot, per-team embedding-similarity backfill that proposes
      typed relations (origin=ai, status=suggested) between similar resources.
      Runs in the background and coalesces concurrent triggers; returns 202
      immediately. Requires permission to create resources in the team.
    operationId: seedRelations
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
    responses:
      '202':
        description: Seed backfill accepted and running in the background (no content)
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not create relations in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to trigger the relation seed backfill
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Relations
