api-v1-teams-id-top-accessed-resources:
  get:
    summary: Per-team most-accessed resources
    description: >-
      Returns the team's most-accessed resources over the requested window, ranked
      by access count descending and capped by the limit parameter, with each row's
      display name resolved so the frontend can render and deep-link it. Authorized
      via team membership.
    operationId: getTeamTopAccessedResources
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Team identifier
        schema:
          type: string
          format: uuid
      - name: range
        in: query
        required: false
        description: The reporting window. Defaults to 30d.
        schema:
          type: string
          enum: ['7d', '14d', '30d', '60d', '90d', '180d']
          default: '30d'
      - name: limit
        in: query
        required: false
        description: Maximum number of resources to return (1–50). Defaults to 5.
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 5
      - name: source
        in: query
        required: false
        description: >-
          Restrict the ranking to a single access channel. Omitted or 'all'
          aggregates across all channels (the default behavior).
        schema:
          type: string
          enum: ['all', 'web', 'cli', 'mcp', 'api']
          default: 'all'
    responses:
      '200':
        description: Team top accessed resources retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/TeamTopAccessedResourcesResponse'
      '400':
        description: Invalid request parameters
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden (not a team member)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Teams

api-v1-teams-id-resource-access-metrics:
  get:
    summary: Per-team daily access metrics
    description: >-
      Returns a zero-filled daily access timeseries for a team, grouped by source
      (web, cli, mcp, api), aggregated across every resource in the team, for the
      team analytics-page chart. Every day in the requested range appears even
      when its count is zero. Authorized via team membership.
    operationId: getTeamResourceAccessMetrics
    security:
