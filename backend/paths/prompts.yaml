api-v1-team_id-prompts-slug-versions-version_number-restore:
  post:
    summary: Restore a prompt to a content version
    description: >-
      Restores the prompt's raw Body template to the given version. The
      pre-restore body is snapshotted as a new version, so restore is
      non-destructive and preserves placeholders and @slug references. Returns
      the updated prompt.
    operationId: restorePromptVersion
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: slug
        in: path
        required: true
        description: Prompt slug
        schema:
          type: string
      - name: version_number
        in: path
        required: true
        description: Version number to restore
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: Prompt restored successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Prompt'
      '400':
        description: Invalid version_number
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden (not a team member)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Prompt or version not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Prompts
