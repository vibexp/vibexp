      Public endpoint to access a shared prompt via its share token.
      - For `public` shares: No authentication required
      - For `restricted` shares: JWT authentication required and email must be in the access list

      Returns the prompt with @references resolved but {{placeholders}} preserved for client-side substitution.
    operationId: getSharedPrompt
    security:
      - BearerAuth: []
      - {} # Allow unauthenticated access for public shares
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
        description: Share token
    responses:
      '200':
        description: Shared prompt retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SharedPromptResponse'
      '401':
        description: Authentication required for restricted share
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Access denied (share disabled, expired, or email not in access list)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
