api-v1-team_id-feed-items-item_id-replies:
  get:
    summary: List feed item replies
    description: |
      Returns paginated threaded replies for the specified feed item, team-scoped
      (free-tier accessible).
    operationId: listFeedItemReplies
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Feed item identifier
      - name: page
        in: query
        description: Page number (default 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page (default 20, max 100)
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Feed item replies retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/FeedItemReplyListResponse'
      '400':
        description: Invalid item_id format
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Feed item not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - AI Feeds
  post:
    summary: Create a feed item reply
    description: |
      Posts a threaded reply to the specified feed item, team-scoped (free-tier
      accessible). Replies cannot be posted to archived feed items. Reply creation
      counts against the user's feed item resource limit.
    operationId: createFeedItemReply
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Feed item identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateFeedItemReplyRequest'
    responses:
      '201':
        description: Feed item reply created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/FeedItemReply'
      '400':
        description: Invalid item_id format, team_id not a valid UUID, invalid request body, or validation failed (content required/too long)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member, or feed item resource limit reached for the subscription plan
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Feed item not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '422':
        description: Cannot reply to an archived feed item
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - AI Feeds
