# feeds path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-team_id-feeds:
  post:
    summary: Create a new feed
    description: Creates a new AI feed channel for the specified team (free-tier accessible)
    operationId: createFeed
    security:
      - BearerAuth: []
      - ApiKeyAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateFeedRequest'
    responses:
      '201':
        description: Feed created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Feed'
      '400':
        description: Invalid request data or validation error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '409':
        description: A feed with that name already exists in this team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - AI Feeds

  get:
    summary: List feeds
    description: Returns all feeds for the specified team with optional pagination
    operationId: listFeeds
    security:
      - BearerAuth: []
      - ApiKeyAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: search
        in: query
        description: Search in feed name and description
        schema:
          type: string
      - name: page
        in: query
        description: Page number (default 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page (default 20, max 100)
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Feeds retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/FeedListResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - AI Feeds

