# health path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

ping:
  get:
    summary: Health ping endpoint
    description: Simple endpoint to check if the service is running
    operationId: ping
    security: []  # No authentication required
    responses:
      '200':
        description: Service is running
        content:
          text/plain:
            schema:
              type: string
              example: "pong"
    tags:
      - Health

health:
  get:
    summary: Detailed health check
    description: Returns detailed health status of the service
    operationId: health
    security: []  # No authentication required
    responses:
      '200':
        description: Service health status
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HealthResponse'
    tags:
      - Health
