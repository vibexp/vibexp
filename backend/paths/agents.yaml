api-v1-team_id-agents-id-execute:
  post:
    summary: Execute agent
    description: |
      Invokes an agent via the A2A protocol. For streaming-capable agents the call
      returns immediately with status `pending` or `submitted`; poll
      `GET /agents/executions/{id}/status` and fetch
      `GET /agents/executions/{id}/events` for progress. For non-streaming agents
      the call blocks until the execution finishes with status `success` or `error`.
    operationId: executeAgent
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Agent identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ExecuteAgentRequest'
    responses:
      '200':
        description: Execution created (streaming agents) or completed (non-streaming agents)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AgentExecution'
      '400':
        description: Invalid request body or agent is not active
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '402':
        description: Payment required — active subscription required
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Agent not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Agents

