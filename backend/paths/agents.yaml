api-v1-team_id-agents-executions-id-events:
  get:
    summary: Get execution events
    description: |
      Returns streaming events for an execution. Supports two modes: cursor-based
      polling via `?since={sequence}` (returns execution status plus events after
      that sequence number) and page-based pagination via `?page`/`?limit` for
      historical viewing.
    operationId: getAgentExecutionEvents
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Execution identifier
      - name: since
        in: query
        description: Return events with a sequence number greater than this value (enables cursor-based polling)
        schema:
          type: integer
          minimum: 0
      - name: page
        in: query
        description: Page number (page-based mode only)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page (page-based mode only)
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
    responses:
      '200':
        description: Events retrieved successfully (shape depends on whether `since` was provided)
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../openapi.yaml#/components/schemas/AgentExecutionEventsPollResponse'
                - $ref: '../openapi.yaml#/components/schemas/AgentExecutionEventsPageResponse'
      '400':
        description: Invalid team_id
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '402':
        description: Payment required — active subscription required
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — not a team member
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Execution not found, or its agent does not belong to the specified team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Agents

