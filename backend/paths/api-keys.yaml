# api-keys path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-api-keys:
  post:
    summary: Create new API key
    description: Creates a new API key for the authenticated user
    operationId: createAPIKey
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateAPIKeyRequest'
    responses:
      '201':
        description: API key created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateAPIKeyResponse'
      '400':
        description: Invalid request data
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - API Keys

  get:
    summary: List API keys
    description: Retrieves all API keys for the authenticated user
    operationId: listAPIKeys
    parameters:
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      '200':
        description: API keys retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/APIKeyListResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - API Keys

api-v1-api-keys-id:
  delete:
    summary: Delete API key
    description: Deletes an API key by ID
    operationId: deleteAPIKey
    parameters:
      - name: id
        in: path
        required: true
        description: API key ID
        schema:
          type: string
    responses:
      '200':
        description: API key deleted successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/SuccessResponse'
      '404':
        description: API key not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - API Keys

