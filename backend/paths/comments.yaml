# Resource comments path items (epic #272) — referenced from ../openapi.yaml.
# Team-scoped under /api/v1/{team_id}/comments; the commented resource is
# identified by the resource_type + resource_id query params (universal shape,
# cf. attachments). REST-only — no MCP surface.

api-v1-team_id-comments:
  get:
    summary: List a resource's comments
    description: >
      Returns a page of comments on the given resource, newest first. The caller
      must be a member of the team.
    operationId: listComments
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: resource_type
        in: query
        required: true
        description: Type of the commented resource (artifact, memory, prompt, or blueprint)
        schema:
          type: string
      - name: resource_id
        in: query
        required: true
        description: Identifier of the commented resource
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        description: Page number (1-based)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Comments retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CommentListResponse'
      '400':
        description: Invalid resource_type or query parameters
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller is not a member of the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to list comments
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Comments

  post:
    summary: Create a comment
    description: >
      Adds a comment on a resource. Any team member may comment; the target
      resource must exist in the team (404 otherwise).
    operationId: createComment
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateCommentRequest'
    responses:
      '201':
        description: Comment created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Comment'
      '400':
        description: Invalid resource_type or content
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not comment in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Target resource not found in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to create comment
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Comments

api-v1-team_id-comments-recent:
  get:
    summary: List recent comment activity
    description: >
      Returns the team's most recent comment activity for the homepage card,
      ordered by latest activity (an edited comment resurfaces). Each entry
      carries its resource's resolved title and link fields; entries whose
      resource has been deleted are omitted.
    operationId: listRecentComments
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: limit
        in: query
        required: false
        description: Maximum number of entries to return
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      '200':
        description: Recent comments retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/RecentCommentListResponse'
      '400':
        description: Invalid query parameters
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller is not a member of the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to list recent comments
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Comments

api-v1-team_id-comments-comment_id:
  patch:
    summary: Edit a comment
    description: >
      Updates a comment's content. Only the comment's author may edit it; no
      role can edit another member's comment (403 otherwise).
    operationId: updateComment
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: comment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Comment identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/UpdateCommentRequest'
    responses:
      '200':
        description: Comment updated successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Comment'
      '400':
        description: Invalid content
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller is not the comment's author
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Comment not found in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to update comment
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Comments

  delete:
    summary: Delete a comment
    description: >
      Deletes a comment. The author may delete their own; a team admin or owner
      may delete any comment (403 otherwise).
    operationId: deleteComment
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: comment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Comment identifier
    responses:
      '204':
        description: Comment deleted (no content)
      '400':
        description: comment_id is not a valid UUID
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Caller may not delete this comment
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Comment not found in the team
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to delete comment
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Comments
