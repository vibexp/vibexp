# ai-tools path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-ai-tools-claude-code-sessions-session_id:
  delete:
    summary: Delete Claude Code session
    description: Deletes a specific Claude Code session and all associated hook data
    operationId: deleteClaudeCodeSession
    parameters:
      - name: session_id
        in: path
        required: true
        description: Session ID
        schema:
          type: string
    responses:
      '204':
        description: Session deleted successfully
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Session not found or access denied
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Claude Code Hooks

api-v1-ai-tools-cursor-ide-sessions-session_id:
