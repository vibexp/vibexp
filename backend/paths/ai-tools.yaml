api-v1-ai-tools-claude-code-session-counts:
  get:
    summary: Get Claude Code session counts
    description: Returns the authenticated user's Claude Code session counts per day for the requested range
    operationId: getClaudeCodeSessionCounts
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: range
        in: query
        required: false
        description: >-
          Time range for the counts. Accepted values: `7d` (or `7`), `14d` (or `14`),
          `30d` (or `30`), `90d` (or `90`, `3m`). Unknown values fall back to `7d`.
        schema:
          type: string
          default: '7d'
    responses:
      '200':
        description: Session counts retrieved successfully
        content:
          application/json:
            schema:
