api-v1-ai-tools-claude-code-hooks:
  get:
    summary: List Claude Code hook payloads
    description: Returns the authenticated user's stored Claude Code hook payloads with pagination and optional filters
    operationId: listClaudeCodeHooks
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: page
        in: query
        required: false
        description: Page number (default 1; values < 1 fall back to 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        required: false
        description: Items per page (default 10, capped at 100)
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: session_id
        in: query
        required: false
        description: Filter by session ID
        schema:
          type: string
      - name: hook_event_name
        in: query
        required: false
        description: Filter by hook event name
        schema:
          type: string
          example: "PreToolUse"
      - name: tool_name
        in: query
        required: false
        description: Filter by tool name
        schema:
          type: string
          example: "Bash"
    responses:
      '200':
        description: Hook payloads retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookListResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error (legacy hook error shape)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
    tags:
      - Claude Code Hooks

