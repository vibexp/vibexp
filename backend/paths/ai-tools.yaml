api-v1-claude-code-hooks:
  post:
    summary: Ingest Claude Code hook payload
    description: >-
      Stores a hook payload fired by the Claude Code CLI during an active coding session.
      Authenticated via API key (bearer) or session cookie; not IP-rate-limited.
      Responses use the legacy CLI-compatible `{status, message}` shape rather than the
      standard envelope. New sessions are checked against the user's `ai_session`
      resource limit (and `ai_tool` limit for the first-ever session), returning 403
      when exceeded.
    operationId: ingestClaudeCodeHook
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/IncomingHookPayload'
    responses:
      '201':
        description: Hook payload stored successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookCreatedResponse'
      '400':
        description: Invalid JSON payload or missing required field (session_id, hook_event_name)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: AI session or AI tools resource limit reached for the subscription plan (includes `details`)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
      '500':
        description: Internal server error (legacy hook error shape)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
    tags:
      - Claude Code Hooks

api-v1-cursor-ide-hooks:
  post:
    summary: Ingest Cursor IDE hook payload
    description: >-
      Stores a hook payload fired by Cursor IDE hooks. Authenticated via API key
      (bearer) or session cookie; not IP-rate-limited. When `session_id` is absent,
      `conversation_id` is used as the session identifier (one of the two is required).
      Responses use the legacy CLI-compatible `{status, message}` shape rather than the
      standard envelope. New sessions are checked against the user's `ai_session`
      resource limit (and `ai_tool` limit for the first-ever session), returning 403
      when exceeded.
    operationId: ingestCursorIDEHook
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/IncomingCursorHookPayload'
    responses:
      '201':
        description: Hook payload stored successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookCreatedResponse'
      '400':
        description: Invalid JSON payload or missing required field (session_id/conversation_id, hook_event_name)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: AI session or AI tools resource limit reached for the subscription plan (includes `details`)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
      '500':
        description: Internal server error (legacy hook error shape)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/HookErrorResponse'
    tags:
      - Cursor IDE Hooks
