api-v1-team_id-artifacts-project_id-slug-attachments:
  post:
    summary: Upload an attachment to an artifact
    description: >
      Uploads a single file (multipart field `file`) as an attachment on the
      artifact. Enforces a 5 MB per-file limit, a 10 MB cumulative limit per
      artifact, and a safe file-type allowlist.
    operationId: uploadArtifactAttachment
    deprecated: true
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: project_id
        in: path
        required: true
        description: UUID of the project
        schema:
          type: string
          format: uuid
      - name: slug
        in: path
        required: true
        description: Artifact slug
        schema:
          type: string
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
                description: The file to attach
            required:
              - file
    responses:
      '201':
        description: Attachment uploaded successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Attachment'
      '400':
        description: Missing file, file too large, cumulative limit exceeded, or disallowed type
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden (not a team member)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Artifact not found
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '503':
        description: Attachment storage is not available
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Artifacts

  get:
    summary: List attachments for an artifact
    description: Returns all attachments on the artifact, newest first, plus their combined size.
    operationId: listArtifactAttachments
    deprecated: true
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: project_id
        in: path
        required: true
