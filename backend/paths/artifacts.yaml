# artifacts path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-team_id-artifacts:
  post:
    summary: Create new artifact
    description: Creates a new artifact for the authenticated user within the specified team
    operationId: createArtifact
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateArtifactRequest'
    responses:
      '201':
        description: Artifact created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/Artifact'
      '400':
        description: Invalid request data or validation error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden (not a team member or subscription required)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '409':
        description: Artifact with same slug already exists in project
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Artifacts

  get:
    summary: List artifacts
    description: Retrieves all artifacts for the specified team with optional filtering
    operationId: listArtifacts
    parameters:
      - name: team_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Team identifier
      - name: project_id
        in: query
        description: Filter by project ID
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        description: Filter by status
        schema:
          type: string
          enum: [active, draft, archived]
      - name: type
        in: query
        description: >-
          Filter by type. An open string matched against the team's registered types
          (the system defaults work_reports, static_contexts and general, plus any
          custom types the team has added), not a fixed enum.
        schema:
          type: string
      - name: search
        in: query
        description: Search in title, description, and content
        schema:
          type: string
      - name: sort_by
        in: query
        description: Sort field
        schema:
          type: string
          enum: [created_at, updated_at, title]
      - name: sort_order
        in: query
        description: Sort order
        schema:
          type: string
          enum: [asc, desc]
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Artifacts retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ArtifactListResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden (not a team member)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Artifacts

