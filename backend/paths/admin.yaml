# Admin (instance-level) API paths for the /api/v1/admin surface. Every
# operation is guarded by instance-admin authorization: non-admin and
# unauthenticated callers receive 404 (Not Found) rather than 401/403, so the
# surface is not advertised to non-admins.

api-v1-admin-stats:
  get:
    summary: Get instance statistics
    description: |
      Returns instance-wide entity counts (users, teams, prompts, artifacts,
      memories) and the running backend application version. Requires the
      authenticated user to be a configured instance admin
      (auth.instance_admins); non-admin and unauthenticated requests receive 404.
    operationId: getAdminStats
    tags:
      - Admin
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    responses:
      '200':
        description: Instance statistics retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AdminStatsResponse'
      '404':
        description: Not found — the caller is not an instance admin (surface not advertised)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

api-v1-admin-users:
  get:
    summary: List instance users
    description: |
      Returns a paginated, instance-wide listing of users with each user's team
      count. Supports case-insensitive search, typed filters, and allowlisted
      sorting; filters combine with AND and the pagination envelope reflects the
      filtered set. Instance-admin only; non-admin and unauthenticated requests
      receive 404.
    operationId: listAdminUsers
    tags:
      - Admin
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: page
        in: query
        description: 1-based page number
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        description: Items per page
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        description: Case-insensitive substring match over the user's email and name.
        required: false
        schema:
          type: string
      - name: idp_provider
        in: query
        description: Exact match on the user's identity-provider name (e.g. "google", "oidc").
        required: false
        schema:
          type: string
      - name: created_from
        in: query
        description: Only users created at or after this instant (inclusive).
        required: false
        schema:
          type: string
          format: date-time
      - name: created_to
        in: query
        description: Only users created at or before this instant (inclusive).
        required: false
        schema:
          type: string
          format: date-time
      - name: sort_by
        in: query
        description: Column to sort by. Ties are always broken by user id so paging is stable.
        required: false
        schema:
          type: string
          enum:
            - created_at
            - email
            - name
            - team_count
          default: created_at
      - name: sort_order
        in: query
        description: Sort direction.
        required: false
        schema:
          type: string
          enum:
            - asc
            - desc
          default: desc
    responses:
      '200':
        description: A page of users
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AdminUserListResponse'
      '400':
        description: Bad request — a query parameter is malformed or outside its enum
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Not found — the caller is not an instance admin (surface not advertised)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

api-v1-admin-users-id:
  get:
    summary: Get an instance user
    description: |
      Returns one user with their team memberships (team name + the user's role
      in each team). Instance-admin only; non-admin and unauthenticated requests
      receive 404, as does an unknown user id.
    operationId: getAdminUser
    tags:
      - Admin
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User id (UUID)
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: The user with their team memberships
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AdminUserDetail'
      '404':
        description: Not found — unknown user id, or the caller is not an instance admin
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

