      - Admin
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Team id (UUID)
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: The team with its owner and members
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AdminTeamDetail'
      '404':
        description: Not found — unknown team id, or the caller is not an instance admin
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
