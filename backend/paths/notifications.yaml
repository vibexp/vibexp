# notifications path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-notifications:
  get:
    summary: List notifications
    description: |
      Returns the authenticated user's in-app notifications, newest first, with
      offset-based pagination. `count` is the number of items in this page (≤ `limit`),
      not the global total — use the unread-count endpoint for unread totals.
    operationId: listNotifications
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Maximum number of notifications to return (1-100)
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Number of notifications to skip
      - name: unread
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: When true, return only unread notifications
    responses:
      '200':
        description: Notifications retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/NotificationListResponse'
      '400':
        description: Invalid query parameter (limit not in 1-100, negative offset, or non-boolean unread)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to list notifications
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Notifications

api-v1-notifications-unread-count:
  get:
    summary: Get unread notification count
    description: Returns the total number of unread notifications for the authenticated user.
    operationId: getUnreadNotificationCount
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    responses:
      '200':
        description: Unread count retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UnreadCountResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to get unread notification count
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Notifications

api-v1-notifications-id-read:
  patch:
    summary: Mark notification as read
    description: |
      Marks a single notification as read for the authenticated user. Idempotent —
      succeeds with 204 even if the notification is already read or does not belong
      to the user (no 404 is returned).
    operationId: markNotificationRead
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Notification identifier
    responses:
      '204':
        description: Notification marked as read (no content)
      '400':
        description: Notification id is not a valid UUID
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to mark notification as read
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Notifications

api-v1-notifications-read-all:
  patch:
    summary: Mark all notifications as read
    description: Marks all of the authenticated user's notifications as read. No request body is required.
    operationId: markAllNotificationsRead
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    responses:
      '204':
        description: All notifications marked as read (no content)
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to mark all notifications as read
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Notifications
