# model-providers path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

api-v1-model-providers:
  parameters:
    - name: team_id
      in: path
      required: true
      description: Team that owns the model provider(s).
      schema:
        type: string
        format: uuid
  post:
    summary: Create model provider
    description: |
      Creates a new model provider configuration for the authenticated user.
      The `api_key` supplied in the request is encrypted at rest and is never
      returned by the API — responses expose only a `has_api_key` boolean.
      Returns 200 (not 201) on success.
    operationId: createModelProvider
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/CreateModelProviderRequest'
    responses:
      '200':
        description: Model provider created successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ModelProviderResponse'
      '400':
        description: Malformed JSON body (`BAD_REQUEST`) or missing required fields (`MODEL_PROVIDER_VALIDATION_FAILED` with `validation_errors`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: >-
          Forbidden - managing provider settings requires team owner/admin (`FORBIDDEN`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '409':
        description: A provider with the same name already exists (`MODEL_PROVIDER_ALREADY_EXISTS`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Provider creation failed (`MODEL_PROVIDER_CREATE_FAILED`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

  get:
    summary: List model providers
    description: |
      Retrieves all model providers belonging to the authenticated user.
      Returns a bare JSON array (no pagination envelope). Encrypted API keys
      are never included; each item carries a `has_api_key` boolean instead.
    operationId: listModelProviders
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    responses:
      '200':
        description: Model providers retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ModelProviderResponseList'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to retrieve model providers (`DATABASE_ERROR`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

api-v1-model-providers-id:
  parameters:
    - name: team_id
      in: path
      required: true
      description: Team that owns the model provider(s).
      schema:
        type: string
        format: uuid
  get:
    summary: Get model provider
    description: |
      Retrieves a single model provider owned by the authenticated user.
      The encrypted API key is never returned; `has_api_key` indicates whether
      one is stored.
    operationId: getModelProvider
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Model provider ID
        schema:
          type: string
    responses:
      '200':
        description: Model provider retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ModelProviderResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Model provider not found (`MODEL_PROVIDER_NOT_FOUND`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Failed to retrieve model provider (`DATABASE_ERROR`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

  put:
    summary: Update model provider
    description: |
      Updates an existing model provider. All fields are optional; only
      provided fields are changed. A supplied `api_key` replaces the stored
      (encrypted) key and is never echoed back in the response. A blank/omitted
      `api_key` preserves the stored key.
    operationId: updateModelProvider
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Model provider ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/UpdateModelProviderRequest'
    responses:
      '200':
        description: Model provider updated successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ModelProviderResponse'
      '400':
        description: Malformed JSON body (`BAD_REQUEST`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: >-
          Forbidden - managing provider settings requires team owner/admin (`FORBIDDEN`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Model provider not found (`MODEL_PROVIDER_NOT_FOUND`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Provider update failed (`MODEL_PROVIDER_UPDATE_FAILED`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

  delete:
    summary: Delete model provider
    description: |
      Deletes a model provider owned by the authenticated user. Deleting the
      team's last remaining provider is blocked with a 400
      `MODEL_PROVIDER_LAST_DELETE_BLOCKED` error.
    operationId: deleteModelProvider
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Model provider ID
        schema:
          type: string
    responses:
      '204':
        description: Model provider deleted successfully (no body)
      '400':
        description: Cannot delete the last model provider (`MODEL_PROVIDER_LAST_DELETE_BLOCKED`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: >-
          Forbidden - managing provider settings requires team owner/admin (`FORBIDDEN`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '404':
        description: Model provider not found (`MODEL_PROVIDER_NOT_FOUND`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Provider deletion failed (`MODEL_PROVIDER_DELETE_FAILED`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

api-v1-model-providers-validate:
  parameters:
    - name: team_id
      in: path
      required: true
      description: Team that owns the model provider(s).
      schema:
        type: string
        format: uuid
  post:
    summary: Validate model provider configuration
    description: |
      Validates a model provider configuration (connectivity/credentials)
      without persisting anything. The probe attempts `GET {base_url}/models`
      and falls back to `POST {base_url}/chat/completions`. Validation outcome —
      including an invalid configuration — is reported in the 200 response body
      (`is_valid`, `message`, `details`); 500 is returned only for internal
      service errors.
    operationId: validateModelProvider
    security:
      - ApiKeyAuth: []
      - CookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ValidateModelProviderRequest'
    responses:
      '200':
        description: Validation completed (check `is_valid` for the outcome)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ValidateModelProviderResponse'
      '400':
        description: Malformed JSON body (`BAD_REQUEST`) or missing required fields (`MODEL_PROVIDER_VALIDATION_FAILED` with `validation_errors`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '403':
        description: >-
          Forbidden - managing provider settings requires team owner/admin (`FORBIDDEN`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Validation failed due to an internal service error (`INTERNAL_ERROR`)
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Model Providers

