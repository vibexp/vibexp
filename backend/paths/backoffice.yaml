# backoffice path items — referenced from ../openapi.yaml (component refs resolve
# back through the root document). One domain per file; see the repo layout
# note in openapi.yaml info.description.

bo-v1-reports-usage-and-growth:
  get:
    summary: Get usage and growth data
    description: |
      Retrieves platform-wide usage metrics and per-user activity data.
      This endpoint is for administrative purposes only and requires the back office admin API key.
      It is NOT accessible via JWT tokens or regular API keys.
    operationId: getUsageAndGrowth
    security:
      - BackofficeAuth: []
    parameters:
      - name: from
        in: query
        description: Filter data from this date (YYYY-MM-DD format). Both 'from' and 'to' must be provided together.
        required: false
        schema:
          type: string
          format: date
          example: "2024-01-01"
      - name: to
        in: query
        description: Filter data until this date (YYYY-MM-DD format). Both 'from' and 'to' must be provided together.
        required: false
        schema:
          type: string
          format: date
          example: "2024-01-31"
    responses:
      '200':
        description: Usage and growth data retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UsageAndGrowthResponse'
      '400':
        description: Invalid request parameters (e.g., invalid date format, 'to' before 'from')
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - Missing or invalid back office admin API key
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Back Office

bo-v1-embeddings-backfill:
  post:
    summary: Regenerate embeddings
    description: |
      Republishes the `.created` event for embeddable entities (prompts,
      artifacts, memories, blueprints, and feed items) so the embedding pipeline
      regenerates vectors under the currently configured embedding model. This is
      the operational step after an embedding model or dimension change. The
      operation is idempotent (the pipeline uses delete-then-insert per entity).

      The scope is explicit: the request body must set exactly one of `all` or a
      non-empty `entity_types`. Set `missing_only` to limit the run to entities
      that lack an embedding for the configured model. This endpoint is for
      administrative purposes only and requires the back office admin API key.
    operationId: backfillEmbeddings
    security:
      - BackofficeAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/EmbeddingBackfillRequest'
    responses:
      '200':
        description: Backfill completed; per-entity-type and aggregate counts returned.
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/EmbeddingBackfillResult'
      '400':
        description: >-
          Invalid request body, no scope (`all` and `entity_types` both empty),
          an ambiguous scope (both `all` and `entity_types` set), or an
          unsupported entity type was requested.
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized - Missing or invalid back office admin API key
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/problem+json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
    tags:
      - Back Office
