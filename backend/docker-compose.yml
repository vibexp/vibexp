version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: vibexp_io
      POSTGRES_USER: vibexp_app
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d vibexp_io -U vibexp_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dev-only SMTP sink + web UI for inspecting outgoing email locally.
  # SMTP on :1025, web UI on http://localhost:8025. No volume — the inbox is
  # ephemeral, so `docker compose down` leaves no stale state.
  mailpit:
    image: axllent/mailpit:v1.30.2
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      # The smtp email provider hardcodes AUTH_PLAIN, so Mailpit must accept auth.
      # Accept any credentials and allow it over the plaintext (non-TLS) dev link.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # HuggingFace text-embeddings-inference serving mixedbread-ai/mxbai-embed-large-v1
  # (1024-dim) with an OpenAI-compatible /v1/embeddings — a zero-config local
  # backend for the embedding/semantic-search pipeline. Register it as a team
  # embedding provider (type openai_compatible, base_url http://localhost:8000/v1,
  # model mixedbread-ai/mxbai-embed-large-v1, any/empty API key); see the README.
  # First start downloads ~670MB of model weights into the tei_data volume.
  # --auto-truncate clips over-length input at 512 tokens instead of erroring;
  # --max-client-batch-size 64 bounds request batch size.
  # No healthcheck: the image has no shell/curl to probe with; check
  # http://localhost:8000/health from the host instead.
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: --model-id mixedbread-ai/mxbai-embed-large-v1 --auto-truncate --max-client-batch-size 64
    ports:
      - "${TEI_PORT:-8000}:80"
    volumes:
      - tei_data:/data

  vibexp:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: vibexp_app
      DB_PASSWORD: local_password
      DB_NAME: vibexp_io
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  tei_data:
