    InviterInfo:
      type: object
      description: Information about the user who sent a team invitation
      properties:
        id:
          type: string
          example: "user_123"
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane@example.com"

    InvitationResponse:
      type: object
      description: Team invitation enriched with team and inviter details
      properties:
        id:
          type: string
          example: "inv_123"
        token:
          type: string
          description: Opaque invitation token used in invitation URLs
          example: "abc123def456..."
        team_id:
          type: string
          example: "team_123"
        team_name:
          type: string
          example: "Acme Corp"
        invitee_email:
          type: string
          format: email
          example: "invitee@example.com"
        role:
          type: string
          enum: [member, admin]
          example: "member"
        status:
          type: string
          enum: [pending, accepted, rejected, revoked]
          example: "pending"
        expires_at:
          type: string
          format: date-time
          example: "2025-09-29T12:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2025-09-22T12:00:00Z"
        invited_by:
