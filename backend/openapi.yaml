    PaginatedResponse:
      $ref: "./schemas/common.yaml#/PaginatedResponse"

    ResourceAccessDailyCount:
      type: object
      description: Per-source access counts for a single calendar day (UTC), zero-filled.
      required: [date, web, cli, mcp, api, total]
      properties:
        date:
          type: string
          format: date
          example: '2026-05-01'
        web:
          type: integer
          example: 3
        cli:
          type: integer
          example: 1
        mcp:
          type: integer
          example: 0
        api:
          type: integer
          example: 0
        total:
          type: integer
          example: 4
    ResourceAccessMetricsData:
      type: object
      required: [total_accesses, range, counts]
      properties:
        total_accesses:
          type: integer
          description: Sum of every access count across the whole window.
          example: 142
        range:
          type: string
          enum: ['7d', '14d', '30d', '60d', '90d', '180d']
          example: '30d'
        counts:
          type: array
          items:
            $ref: '#/components/schemas/ResourceAccessDailyCount'
    ResourceAccessMetricsResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Resource access metrics retrieved successfully
        data:
          $ref: '#/components/schemas/ResourceAccessMetricsData'

