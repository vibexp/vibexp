  - url: https://api.example.com
    description: Production REST API
  - url: http://localhost:8080
    description: Local development server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Identity-provider access token (RS256 JWT) sent as `Authorization: Bearer <token>`.
        Used by native clients (mobile) that authenticate via OAuth 2.1 + PKCE.
        Access tokens expire after ~1 hour; clients refresh them directly against
        the issuer with the rotated refresh token (`offline_access` scope). Only
        accepted when the server is configured with `API_OAUTH_ISSUER`.
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: Use your API key as the bearer token for specific endpoints
    BackofficeAuth:
      type: http
      scheme: bearer
      description: Use the back office admin API key for administrative endpoints (NOT accessible via JWT or regular API keys)
    CookieAuth:
      type: apiKey
      in: cookie
      name: vx_session
      description: Encrypted httpOnly session cookie set by the identity-provider OAuth callback — how the web app authenticates

