            - /home/user/project
        configuration:
          type: object
          nullable: true
          description: Hook configuration data
          additionalProperties: true
        reference:
          type: object
          nullable: true
          description: Reference data
          additionalProperties: true
        context:
          type: object
          nullable: true
          description: Context data
          additionalProperties: true
        input:
          type: object
          nullable: true
          description: Input data for the hook
