  /api/v1/{team_id}/prompts:
    post:
      summary: Create a new prompt
      description: |
        Creates a new prompt template for the specified team. The prompt can be used to store
        reusable AI instructions with placeholders and references.
      operationId: createPrompt
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '400':
          description: Invalid request (validation error)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (subscription required or resource limit exceeded)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (prompt with slug already exists)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Prompts
    get:
      summary: List prompts
      description: |
        Retrieves a paginated list of prompts for the specified team with optional filtering.
      operationId: listPrompts
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: search
          in: query
          schema:
            type: string
          description: Search term to filter prompts by name or description
        - name: status
          in: query
          schema:
            type: string
            enum:
              - draft
              - published
          description: Filter by prompt status
        - name: labels
          in: query
          schema:
            type: string
          description: Comma-separated list of labels to filter by
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by project ID
        - name: mcp_expose
          in: query
          schema:
            type: boolean
          description: Filter by MCP exposure flag. Non-boolean values are ignored (no filter applied).
        - name: shared
          in: query
          schema:
            type: boolean
          description: Filter by share status (prompts with an active share). Non-boolean values are ignored (no filter applied).
        - name: sort_by
          in: query
          description: 'Field to sort results by. Allowed: name, status, updated_at, created_at. Returns 400 for unknown values.'
          schema:
            type: string
            enum:
              - name
              - status
              - updated_at
              - created_at
        - name: sort_order
          in: query
          description: Sort direction (asc or desc, default desc)
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: List of prompts retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PromptListResponse'
                    required:
                      - data
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (subscription required)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Prompts
