    IncomingCursorHookPayload:
      type: object
      description: Incoming payload from Cursor IDE hooks. Either `session_id` or `conversation_id` must be provided (when `session_id` is absent, `conversation_id` is used as the session identifier). `hook_event_name` is always required.
      properties:
        conversation_id:
          type: string
          description: Cursor conversation identifier (used as session_id when session_id is absent)
          example: conv_123456
        generation_id:
          type: string
          description: Cursor generation identifier
          example: gen_123456
        workspace_roots:
          type: array
          items:
            type: string
          description: Workspace root directories
          example:
            - /home/user/project
        session_id:
          type: string
          description: Session identifier (legacy/optional; falls back to conversation_id)
          example: session_123456
        hook_event_name:
          type: string
          description: Name of the hook event that triggered this payload
          example: beforeShellExecution
        tool_name:
          type: string
          nullable: true
          description: Name of the tool being used
          example: shell
        configuration:
          type: object
          nullable: true
          description: Hook configuration data
          additionalProperties: true
        reference:
          type: object
          nullable: true
          description: Reference data
          additionalProperties: true
        context:
          type: object
          nullable: true
          description: Context data
          additionalProperties: true
        input:
          type: object
          nullable: true
          description: Input data for the hook
          additionalProperties: true
        output:
          type: object
          nullable: true
          description: Output data from the hook
          additionalProperties: true
        inducedFailure:
          type: object
          nullable: true
          description: Induced failure data
          additionalProperties: true
        command:
          type: string
          nullable: true
          description: Shell command (beforeShellExecution)
          example: ls -la
        cwd:
          type: string
          nullable: true
          description: Current working directory (beforeShellExecution)
          example: /home/user/project
        tool_input:
          type: object
          nullable: true
          description: Tool input data (beforeMCPExecution)
          additionalProperties: true
        url:
          type: string
          nullable: true
          description: URL (beforeMCPExecution)
        file_path:
          type: string
          nullable: true
          description: File path (afterFileEdit, beforeReadFile)
          example: /home/user/project/main.go
        edits:
          type: array
          items:
            type: object
            additionalProperties: true
          description: File edits (afterFileEdit)
        content:
          type: string
          nullable: true
          description: File content (beforeReadFile)
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Attachments (beforeReadFile, beforeSubmitPrompt)
        prompt:
          type: string
          nullable: true
          description: User prompt (beforeSubmitPrompt)
          example: Refactor this function
        status:
          type: string
          nullable: true
          description: Status (stop hook)
        permission:
          type: string
          nullable: true
          description: Permission response field
        userMessage:
          type: string
          nullable: true
          description: User message response field
        agentMessage:
          type: string
          nullable: true
          description: Agent message response field
        continue:
          type: boolean
          nullable: true
          description: Continue response field
      required:
        - hook_event_name
      anyOf:
        - required:
            - session_id
        - required:
            - conversation_id
    CursorIDEHookPayload:
      type: object
      properties:
