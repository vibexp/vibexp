    EmbeddingProvider:
      type: object
      properties:
        id:
          type: string
          example: provider_123
        user_id:
          type: string
          example: user_123
        team_id:
          type: string
          format: uuid
          nullable: true
          description: Team that owns this provider.
          example: b1234567-89ab-cdef-0123-456789abcdef
        name:
          type: string
          example: OpenAI Embeddings
        provider_type:
          type: string
          example: openai
        model:
          type: string
          description: Embedding model this provider requests. Must return the fixed vector width VibeXP stores (1024).
          example: text-embedding-3-small
        chunk_size:
          type: integer
          description: In-Go text-chunker size used when embedding documents.
          example: 1000
        chunk_overlap:
          type: integer
          description: Overlap between adjacent chunks.
          example: 200
        concurrency:
          type: integer
          description: Maximum number of simultaneous embedding requests VibeXP issues to this provider. Keep at 1 for single-threaded providers.
          example: 1
        query_prefix:
          type: string
          nullable: true
          description: 'Instruction prefix prepended to search queries before they are embedded (only the text sent to the provider; nothing extra is stored). Asymmetric models require this — e.g. mxbai/BGE English expect "Represent this sentence for searching relevant passages: ", E5 expects "query: ". Empty/null means no prefix (default behaviour).'
          example: 'Represent this sentence for searching relevant passages: '
        document_prefix:
          type: string
          nullable: true
          description: 'Instruction prefix prepended to document chunks before they are embedded (applied only to the text sent to the provider; the stored chunk content is unchanged). E5 expects "passage: "; mxbai/BGE embed documents raw. Changing this invalidates stored vectors and triggers a team re-embed. Empty/null means no prefix (default behaviour).'
          example: 'passage: '
        is_default:
          type: boolean
          example: false
        base_url:
          type: string
          format: uri
          nullable: true
          example: https://api.openai.com/v1
        configuration:
          type: string
          example: '{"model": "text-embedding-ada-002"}'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          description: 'Optimistic-concurrency version counter, incremented on each update. Note: create responses currently return 0 (the persisted row starts at 1) — read it from get/list/update responses instead.'
          example: 1
      required:
        - id
        - user_id
        - name
        - provider_type
        - model
        - chunk_size
        - chunk_overlap
        - concurrency
        - is_default
        - configuration
        - created_at
        - updated_at
        - version
