  /api/v1/claude-code/hooks:
    post:
      summary: Ingest Claude Code hook payload
      description: Stores a hook payload fired by the Claude Code CLI during an active coding session. Authenticated via API key (bearer) or session cookie; not IP-rate-limited. Responses use the legacy CLI-compatible `{status, message}` shape rather than the standard envelope. New sessions are checked against the user's `ai_session` resource limit (and `ai_tool` limit for the first-ever session), returning 403 when exceeded.
      operationId: ingestClaudeCodeHook
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomingHookPayload'
      responses:
        '201':
          description: Hook payload stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookCreatedResponse'
        '400':
          description: Invalid JSON payload or missing required field (session_id, hook_event_name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: AI session or AI tools resource limit reached for the subscription plan (includes `details`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
        '500':
          description: Internal server error (legacy hook error shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
      tags:
        - Claude Code Hooks
  /api/v1/cursor-ide/hooks:
    post:
      summary: Ingest Cursor IDE hook payload
      description: Stores a hook payload fired by Cursor IDE hooks. Authenticated via API key (bearer) or session cookie; not IP-rate-limited. When `session_id` is absent, `conversation_id` is used as the session identifier (one of the two is required). Responses use the legacy CLI-compatible `{status, message}` shape rather than the standard envelope. New sessions are checked against the user's `ai_session` resource limit (and `ai_tool` limit for the first-ever session), returning 403 when exceeded.
      operationId: ingestCursorIDEHook
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncomingCursorHookPayload'
      responses:
        '201':
          description: Hook payload stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookCreatedResponse'
        '400':
          description: Invalid JSON payload or missing required field (session_id/conversation_id, hook_event_name)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: AI session or AI tools resource limit reached for the subscription plan (includes `details`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
        '500':
          description: Internal server error (legacy hook error shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HookErrorResponse'
      tags:
        - Cursor IDE Hooks
  /api/v1/teams:
    post:
      summary: Create a new team
      description: |
        Creates a new team owned by the current user and synchronously bootstraps a
        default "Project 1" project inside it so resources created immediately
        afterwards are correctly scoped.

        Team creation is subject to the plan's team resource limit; exceeding it
        returns `403` with code `RESOURCE_LIMIT_EXCEEDED`.
      operationId: createTeam
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          description: Invalid request body or validation error (name required, name ≤ 100 chars, description ≤ 500 chars)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required — active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Team creation limit reached for the current plan (code `RESOURCE_LIMIT_EXCEEDED`)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Teams
    get:
      summary: List teams
      description: |
        Returns the paginated list of teams the current user belongs to. Invalid
        `page`/`page_size` values silently fall back to the defaults.
      operationId: listTeams
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based; defaults to 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Items per page (defaults to 20, maximum 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Teams retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required — active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Teams
  /api/v1/teams/{id}:
    get:
      summary: Get a team
      description: Returns the team with the requesting user's role populated (member_count is only populated on list responses and is 0 here).
      operationId: getTeam
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Team identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Team retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required — active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found (or the user has no access to it)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Teams
    put:
      summary: Update a team
      description: |
        Updates the team's name and/or description. Only team owners can update a
        team. At least one of `name` or `description` must be provided.
      operationId: updateTeam
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Team identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Team updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          description: Invalid request body or validation error (no fields provided, empty name, name ≤ 100 chars, description ≤ 500 chars)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required — active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — only team owners can update a team
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Teams
    delete:
      summary: Delete a team
      description: |
        Deletes a team. Only team owners can delete a team; personal workspaces and
        the default team cannot be deleted.

        Deletion conflicts return `409` with RFC 9457 problem details carrying an
        UPPERCASE `code` and string-valued `metadata`:
        - `ACTIVE_SUBSCRIPTION_EXISTS` — the team still has an active subscription
        - `SUBSCRIPTION_CANCELING` — the subscription is scheduled to cancel; retry after `metadata.cancel_at`
        - `TEAM_HAS_MEMBERS` — remove all members first (`metadata.member_count`)
      operationId: deleteTeam
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Team identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Team deleted successfully
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required — active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — not the team owner, personal workspace (code `CANNOT_DELETE_PERSONAL_WORKSPACE`), or default team
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Team not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deletion blocked — active/canceling subscription or remaining members (codes `ACTIVE_SUBSCRIPTION_EXISTS`, `SUBSCRIPTION_CANCELING`, `TEAM_HAS_MEMBERS`)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/TeamDeleteConflictError'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Teams
