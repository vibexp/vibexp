        - Projects
  /api/v1/activities:
    get:
      summary: List activities
      description: |
        Returns a paginated list of the authenticated user's activities, with
        optional filtering by type, entity, session, free-text search, and date
        range. Activities are user-scoped (not team-scoped). Invalid filter or
        pagination values are silently ignored and defaults applied.
      operationId: listActivities
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Page number (1-based); converted to an offset using the current limit
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page (values outside 1-100 are ignored)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Explicit result offset (takes precedence over page when both are provided)
        - name: activity_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by activity type (e.g. prompt_created)
        - name: entity_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by entity type (e.g. prompt)
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
          description: Filter by entity identifier
        - name: session_id
          in: query
          required: false
          schema:
            type: string
          description: Filter by session identifier
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Free-text search in activity descriptions
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Include activities from this date (YYYY-MM-DD, inclusive)
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Include activities up to this date (YYYY-MM-DD, inclusive end of day)
      responses:
        '200':
          description: Activities retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListEnvelope'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Active subscription required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Activities
    post:
      summary: Create activity
      description: |
        Manually records an activity for the authenticated user. The server
        enriches the activity metadata with manual_creation/created_via flags
        and overwrites source_ip and user_agent from the request.
      operationId: createActivity
      security:
