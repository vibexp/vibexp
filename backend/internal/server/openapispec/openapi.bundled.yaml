  /api/v1/{team_id}/integrations/github/callback:
    post:
      summary: Handle GitHub App installation callback
      description: |
        Completes the GitHub App installation flow after the user authorizes the app on GitHub.
        The request must include the `installation_id` returned by GitHub and the signed `state`
        parameter from the install URL to prevent CSRF attacks. Requires an active subscription.
      operationId: handleGitHubCallback
      security:
        - BearerAuth: []
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
          description: Team ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                installation_id:
                  type: integer
                  format: int64
                  description: GitHub App installation ID from the callback URL
                  example: 12345678
                setup_action:
                  type: string
                  description: Setup action reported by GitHub on the callback URL (e.g. "install"). Accepted for forward compatibility but currently ignored server-side.
                  example: install
                state:
                  type: string
                  description: HMAC-signed state parameter from the install URL (CSRF protection)
                  example: team-id:1234567890:signature
              required:
                - installation_id
                - state
      responses:
        '201':
          description: GitHub App installation connected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubCallbackResponse'
        '400':
          description: Invalid request body, missing required fields, or invalid/expired state parameter
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - state does not match team or user lacks access
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - this GitHub organization is already connected to another team
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - GitHub Integration
