          in: query
          description: Filter by project name
          schema:
            type: string
            example: my-api-project
        - name: project_id
          in: query
          description: Filter by project ID. On this team-scoped variant the backend reads it only when a project is not already selected via a path parameter (i.e. not on listSpecLibrariesByProject).
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum:
              - active
              - expired
            example: active
        - name: type
