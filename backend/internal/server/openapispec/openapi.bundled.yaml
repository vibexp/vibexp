openapi: 3.0.3
info:
  title: Vibexp.io API
  description: |
    Comprehensive REST API for Vibexp.io - a platform for AI agents, prompt management,
    artifacts, blueprints, memories, and Claude Code integration.

    ## Authentication
    The API supports multiple authentication mechanisms:
    - **Session Cookie** (`vx_session`, httpOnly): how the web app authenticates after the identity-provider OAuth flow (see `CookieAuth`)
    - **Bearer JWT**: identity-provider access token sent as `Authorization: Bearer <token>` (see `BearerAuth`)
    - **API Key**: long-lived key sent as a bearer token, used by the CLI and Claude Code hooks (see `ApiKeyAuth`)
    - **Back office API Key**: admin-only key for `/bo/v1` endpoints (see `BackofficeAuth`)
    - **Public Endpoints**: no authentication required for health checks and auth flows

    ## Documentation scope policy
    This specification MUST document every operation under `/api/v1` and `/bo/v1`,
    with the following intentional exclusions:
    - `/internal/*` (scheduler-invoked internal jobs)
    - `POST /api/v1/events/pubsub` (Pub/Sub push endpoint, not client-facing)
    - `POST /api/v1/integrations/github/webhook` (308 permanent-redirect shim)
    - `/favicon.ico` and `/.well-known/*` (browser/OAuth plumbing)
    - the MCP mount (`/mcp/v1/*` — documented by the MCP protocol, not REST)
    Anything else that exists in `internal/server/server.go` but not here is a bug.

    ## Repository layout
    This is a multi-file spec: this root document holds info/servers/components/tags
    and an index of path-item `$ref`s; the operations live in `paths/<domain>.yaml`
    (one tag = one paths file = one `schemas/<domain>.yaml` file). CI bundles it to
    `dist/openapi.bundled.yaml` (Redocly) — consume the bundle, not the source tree.

    ## Rate Limiting
    API endpoints are rate-limited to ensure fair usage.

    ## Subscriptions
    Many endpoints require an active subscription. Basic tier users have limited access.
