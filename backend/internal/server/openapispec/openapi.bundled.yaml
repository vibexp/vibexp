  /api/v1/{team_id}/projects/{project_id}/migration:
    post:
      summary: Migrate project resources
      description: |
        Moves selected resources (prompts, artifacts, spec libraries, feed items)
        from the source project to a destination project in the same team.
        Slug collisions are handled per the requested conflict policy
        (skip, rename, or overwrite; defaults to skip). Returns per-type
        migrated counts plus skipped/failed outcomes with a 200 status.
      operationId: migrateProject
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source project identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrationRequest'
      responses:
        '200':
          description: Migration completed (individual resources may still be reported as skipped or failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResult'
        '400':
          description: Invalid request body, invalid UUID, invalid conflict_policy, or cross-team migration attempted
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
