          application/json:
            schema:
              $ref: '#/components/schemas/ValidateEmbeddingProviderRequest'
      responses:
        '200':
          description: Validation completed (check `is_valid` for the outcome)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateEmbeddingProviderResponse'
        '400':
          description: Malformed JSON body (`BAD_REQUEST`) or missing required fields (`PROVIDER_VALIDATION_FAILED` with `validation_errors`)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Validation failed due to an internal service error (`INTERNAL_ERROR`)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Embedding Providers
