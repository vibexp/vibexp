  /api/v1/{team_id}/blueprints:
    post:
      summary: Create new spec library
      description: Creates a new spec library for the authenticated user. Spec libraries are used to store API specifications (OpenAPI, AsyncAPI, etc.) and other technical documentation.
      operationId: createBlueprint
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlueprintRequest'
            examples:
              openapi:
                summary: OpenAPI Specification
                value:
                  project_name: my-api-project
                  slug: openapi-spec
                  title: My API OpenAPI Specification
                  description: Complete OpenAPI 3.0.3 specification for the REST API
                  content: |-
                    openapi: 3.0.3
                    info:
                      title: My API
                      version: 1.0.0
                    paths:
                      /users:
                        get:
                          summary: List users
                  type: general
                  status: active
                  metadata:
                    spec_type: openapi
                    version: 3.0.3
      responses:
        '201':
          description: Spec library created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blueprint'
        '400':
          description: Invalid request data or validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  value:
                    type: about:blank
                    title: Bad Request
                    status: 400
                    detail: 'Validation failed: Slug is required'
                    code: validation_error
                    request_id: req_123abc
                    timestamp: '2025-11-08T10:15:30Z'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Resource limit exceeded
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                limit_exceeded:
                  value:
                    type: about:blank
                    title: Forbidden
                    status: 403
                    detail: You have reached the maximum number of spec libraries allowed for your subscription plan
                    code: resource_limit_exceeded
                    request_id: req_123abc
                    timestamp: '2025-11-08T10:15:30Z'
        '409':
          description: Spec library with same slug already exists in project
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                conflict:
                  value:
                    type: about:blank
                    title: Conflict
                    status: 409
                    detail: spec library with slug 'openapi-spec' already exists in project 'my-api-project'
                    code: conflict
                    request_id: req_123abc
                    timestamp: '2025-11-08T10:15:30Z'
      tags:
        - Blueprints
