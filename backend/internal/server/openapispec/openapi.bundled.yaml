components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Identity-provider access token (RS256 JWT) sent as `Authorization: Bearer <token>`.
        Used by native clients (mobile) that authenticate via OAuth 2.1 + PKCE.
        Access tokens expire after ~1 hour; clients refresh them directly against
        the issuer with the rotated refresh token (`offline_access` scope). Only
        accepted when the server is configured with `API_OAUTH_ISSUER`.
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: Use your API key as the bearer token for specific endpoints
    BackofficeAuth:
      type: http
      scheme: bearer
      description: Use the back office admin API key for administrative endpoints (NOT accessible via JWT or regular API keys)
    CookieAuth:
      type: apiKey
      in: cookie
      name: vx_session
      description: Encrypted httpOnly session cookie set by the identity-provider OAuth callback — how the web app authenticates
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        sha:
          type: string
          description: Short release commit SHA (empty outside deployed environments)
          example: de7db3a2
      required:
        - status
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operation completed successfully
        data:
          type: object
          additionalProperties: true
      required:
        - status
        - message
    ErrorResponse:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs
      properties:
        type:
          type: string
          description: URI reference that identifies the problem type
          example: https://api.example.com/errors/VALIDATION_FAILED
        title:
          type: string
          description: Short, human-readable summary of the problem type
          example: Validation Failed
        status:
          type: integer
          description: HTTP status code
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
          example: Request validation failed
        code:
          type: string
          description: Application-specific error code
          example: VALIDATION_FAILED
        request_id:
          type: string
          description: Unique request identifier for tracking and debugging
          example: abc123-def456
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred (RFC3339)
          example: '2025-11-08T10:15:30Z'
        instance:
          type: string
          description: URI reference that identifies the specific occurrence
          example: /api/v1/agents
        validation_errors:
          type: array
          description: Field-level validation errors (present for validation failures)
          items:
            $ref: '#/components/schemas/ValidationError'
      required:
        - type
        - title
        - status
        - detail
        - code
        - request_id
        - timestamp
    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        page:
          type: integer
          description: Current page number
