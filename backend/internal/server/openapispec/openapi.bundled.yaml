          example: text-embedding-3-small
        chunk_size:
          type: integer
          minimum: 1
          description: Optional chunker size; defaults to 1000 when omitted.
          example: 1000
        chunk_overlap:
          type: integer
          minimum: 0
          description: Optional chunk overlap; defaults to 200 when omitted.
          example: 200
        concurrency:
          type: integer
          minimum: 1
          description: Optional max simultaneous embedding requests to this provider; defaults to 1 when omitted.
          example: 1
        query_prefix:
          type: string
          nullable: true
          maxLength: 256
          description: Optional instruction prefix prepended to search queries before embedding. Defaults to empty (no prefix) when omitted.
          example: 'Represent this sentence for searching relevant passages: '
        document_prefix:
          type: string
          nullable: true
          maxLength: 256
          description: Optional instruction prefix prepended to document chunks before embedding. Defaults to empty (no prefix) when omitted.
          example: 'passage: '
        is_default:
          type: boolean
          example: false
        base_url:
          type: string
          format: uri
          example: https://api.openai.com/v1
        api_key:
          type: string
          nullable: true
        configuration:
          type: object
          additionalProperties: true
      required:
        - name
        - provider_type
        - model
    UpdateEmbeddingProviderRequest:
