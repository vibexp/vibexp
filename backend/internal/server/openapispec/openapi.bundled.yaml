          type: string
          description: Snapshot of the resource content at this version
          example: Previous artifact content...
        change_summary:
          type: string
          nullable: true
          description: Human-readable summary of the change captured at this version (the "commit message"). Null when none was recorded; the first version defaults to a resource-specific creation label (e.g. "Created the artifact").
          example: Tightened the restore-flow wording
        actor_type:
          type: string
          enum:
            - human
            - system
          description: 'Who authored this version: ''human'' for a user edit, ''system'' for a system-generated version such as a restore.'
          example: human
        created_by:
          type: string
          format: uuid
          nullable: true
          description: User who triggered the snapshot; null when that user is later deleted
          example: 01234567-89ab-cdef-0123-456789abcdef
        author:
          $ref: '#/components/schemas/VersionAuthor'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the snapshot was created
          example: '2024-01-15T10:30:00Z'
