          example: text-embedding-3-small
        coverage:
          type: array
          description: One entry per embeddable entity type, in a stable order.
          items:
            $ref: '#/components/schemas/EmbeddingCoverageItem'
      required:
        - has_active_provider
        - active_model
        - coverage
