  - name: Prompts
    description: Prompt template management endpoints
  - name: Prompt Sharing
    description: Share prompts publicly or with specific users via email
  - name: Prompt Gallery
    description: Pre-defined reusable prompt templates
  - name: Agents
    description: AI agent management endpoints
  - name: Activities
    description: Activity tracking and analytics endpoints
  - name: Embedding Providers
    description: Embedding provider configuration endpoints
  - name: Model Providers
    description: Model provider (bring-your-own OpenAI-compatible LLM) configuration endpoints
  - name: Subscriptions
    description: Subscription and billing endpoints
  - name: Support
    description: Support request endpoints for authenticated users
  - name: Claude Code Hooks
    description: Claude Code integration endpoints
  - name: Cursor IDE Hooks
    description: Cursor IDE integration endpoints
  - name: Webhooks
    description: Webhook endpoints
  - name: MCP Server
    description: Model Context Protocol server endpoints
  - name: Artifacts
    description: Artifact management endpoints for storing project-specific content
  - name: Attachments
    description: Universal file-attachment endpoints keyed by polymorphic owner_type + owner_id
  - name: Projects
    description: Project management endpoints for organizing resources
  - name: Memories
    description: Memory management endpoints for storing user memories and notes
  - name: Search
    description: Team-scoped semantic search across prompts, artifacts, blueprints and memories for RAG retrieval
  - name: Resource Access Metrics
    description: Team-scoped per-resource daily access analytics for resource detail-page charts (free-tier accessible)
  - name: Blueprints
    description: Blueprint management endpoints for storing API specifications and technical documentation (requires subscription)
  - name: GitHub Integration
    description: GitHub App integration endpoints for connecting repositories, importing projects and blueprints (requires subscription)
  - name: Back Office
    description: Administrative endpoints for platform-wide metrics and reporting (requires back office admin API key)
  - name: AI Feeds
    description: AI Feed endpoints for team-scoped feed channels and AI-generated items (free-tier accessible)
  - name: Teams
    description: Team (workspace) management — CRUD, members, and team subscription/billing endpoints
  - name: Notifications
    description: In-app notification endpoints for the authenticated user
  - name: Types
    description: Team-customizable resource categories (artifact types, etc.)
  - name: User
    description: User account, onboarding, and device registration endpoints
  - name: Team Invitations
    description: Endpoints for inspecting and acting on team invitations from invitation email links
paths:
  /ping:
    get:
      summary: Health ping endpoint
      description: Simple endpoint to check if the service is running
      operationId: ping
      security: []
      responses:
        '200':
          description: Service is running
          content:
            text/plain:
              schema:
                type: string
                example: pong
      tags:
        - Health
  /health:
    get:
      summary: Detailed health check
      description: Returns detailed health status of the service
      operationId: health
      security: []
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      tags:
        - Health
  /api/v1/auth/login:
    get:
      summary: Initiate login with an identity provider
      description: |
        Selects an enabled identity provider, generates a CSRF state, stores the
        (state, provider) pair in a signed `vx_state` cookie, and returns the
        provider's authorization URL. The client should redirect the user to this
        URL to begin the authentication flow.

        The provider is chosen with the `provider` query parameter, whose value is
        one of the deployment's enabled providers (e.g. `google`, `github`,
        `oidc`). When exactly one provider is enabled the parameter may be omitted
        and that provider is used. When several are enabled the parameter is
        required; an unknown or disabled value is rejected (no silent default).
      operationId: login
      security: []
      parameters:
        - name: provider
          in: query
          required: false
          description: |
            Canonical name of the identity provider to use (e.g. `google`,
            `github`, `oidc`). Optional when a single provider is enabled;
            required when more than one is enabled.
          schema:
            type: string
            example: google
      responses:
        '200':
          description: Authorization URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: |
            The `provider` value is unknown/disabled, or it was omitted while
            multiple providers are enabled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: No identity provider is configured (web login unavailable)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/auth/providers:
    get:
      summary: List enabled login providers
      description: |
        Returns the login providers enabled in this deployment's configuration,
        each with a canonical `name` (the value to pass as `?provider=` to
        `GET /api/v1/auth/login`) and a human-readable `display_name` for the
        login UI. The login screen uses this to render a provider picker instead
        of hardcoding the provider list. The list is stable-sorted and may be
        empty when no provider is configured.
      operationId: listAuthProviders
      security: []
      responses:
        '200':
          description: Enabled providers listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/auth/callback:
    get:
      summary: Handle the identity-provider OAuth callback
      description: |
        Validates the CSRF `vx_state` cookie, recovers the provider bound to it,
        exchanges the authorization code with that provider, looks up or creates
        the user, writes a session cookie, and issues a 302 redirect to the
        frontend home page. This endpoint is called by the browser after the user
        authenticates with the upstream provider — it does not return a JSON body
        on success.
      operationId: authCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code returned by the identity provider after user authentication
          schema:
            type: string
            example: 01ABCDEF1234567890
        - name: state
          in: query
          required: false
          description: CSRF state value that must match the signed `vx_state` cookie
          schema:
            type: string
            example: a3f8b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1
      responses:
        '302':
          description: Authentication successful — redirects browser to frontend home page
          headers:
            Location:
              description: Frontend home URL (e.g. https://app.example.com/)
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: Encrypted session cookie (`vx_session`) containing the identity-provider access token
              schema:
                type: string
        '400':
          description: Authorization code is missing
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired CSRF state cookie
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Identity provider authentication failed or session could not be created
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/auth/logout:
    post:
      summary: Log out current user
      description: |
        Clears the session cookie and returns a JSON confirmation. After calling this
        endpoint the client should discard any cached user state and redirect to the
        login page.
      operationId: logout
      security: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/auth/dev/login:
    post:
      summary: Dev login (development only)
      description: |
        Creates or retrieves a user by email address and sets a session cookie without
        going through an external identity provider. Only available when the server is
        running in development mode (`DEV_LOGIN_ENABLED=true`). Returns 404 in all other environments.
      operationId: devLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '200':
          description: Dev authentication successful — session cookie set, user object returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request body or missing required fields
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Endpoint not available outside development environment
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Authentication failed or session could not be created
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/auth/me:
    get:
      summary: Get current user information
      description: |
        Returns information about the currently authenticated user. Authentication is
        verified via the encrypted session cookie (`vx_session`) set during the
        identity-provider OAuth flow or dev login.
      operationId: getMe
      responses:
        '200':
          description: User information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - invalid or missing session cookie
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Authentication
  /api/v1/api-keys:
    post:
      summary: Create new API key
      description: Creates a new API key for the authenticated user
      operationId: createAPIKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          description: Invalid request data
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - API Keys
    get:
      summary: List API keys
      description: Retrieves all API keys for the authenticated user
      operationId: listAPIKeys
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: API keys retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - API Keys
  /api/v1/api-keys/{id}:
    delete:
      summary: Delete API key
      description: Deletes an API key by ID
      operationId: deleteAPIKey
      parameters:
        - name: id
          in: path
          required: true
          description: API key ID
          schema:
            type: string
      responses:
        '200':
          description: API key deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: API key not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - API Keys
  /api/v1/settings/api-keys:
    post:
      summary: Create new API key (Settings)
      description: Creates a new API key for the authenticated user (settings route)
      operationId: createAPIKeySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          description: Invalid request data
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Settings
    get:
      summary: List API keys (Settings)
      description: Retrieves all API keys for the authenticated user (settings route)
      operationId: listAPIKeysSettings
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: API keys retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Settings
  /api/v1/settings/api-keys/{id}:
    delete:
      summary: Delete API key (Settings)
      description: Deletes an API key by ID (settings route)
      operationId: deleteAPIKeySettings
      parameters:
        - name: id
          in: path
          required: true
          description: API key ID
          schema:
            type: string
      responses:
        '200':
          description: API key deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: API key not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Settings
  /api/v1/support/message:
    post:
      summary: Submit support request
      description: |
        Submit a support request from an authenticated user. The request is sent to the VibeXP support team
        via email. Optionally, an acknowledgement email can be sent to the user.
      operationId: submitSupportRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportRequest'
            examples:
              withAcknowledgement:
                summary: Support request with acknowledgement
                value:
                  text: I need help with configuring my API keys for Claude Code integration.
                  acknowledgement: true
                  additional_info:
                    source_url: /settings/api-keys
                    subscription_tier: pro
              withoutAcknowledgement:
                summary: Support request without acknowledgement
                value:
                  text: The prompt gallery search is not returning relevant results.
                  acknowledgement: false
                  additional_info:
                    source_url: /prompt-gallery
                    query: code generation
      responses:
        '200':
          description: Support request submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportResponse'
              example:
                message: Thank you for your message! We'll get back to you soon.
                success: true
        '400':
          description: Invalid request data or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportResponse'
              example:
                message: 'Validation failed: Text is required'
                success: false
        '401':
          description: Unauthorized - JWT token required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error - failed to send support request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportResponse'
              example:
                message: Failed to send support request. Please try again later.
                success: false
      tags:
        - Support
  /api/v1/{team_id}/artifacts:
    post:
      summary: Create new artifact
      description: Creates a new artifact for the authenticated user within the specified team
      operationId: createArtifact
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateArtifactRequest'
      responses:
        '201':
          description: Artifact created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '400':
          description: Invalid request data or validation error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not a team member or subscription required)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Artifact with same slug already exists in project
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Artifacts
    get:
      summary: List artifacts
      description: Retrieves all artifacts for the specified team with optional filtering
      operationId: listArtifacts
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
        - name: project_id
          in: query
          description: Filter by project ID
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum:
              - active
              - draft
              - archived
        - name: type
          in: query
          description: Filter by type. An open string matched against the team's registered types (the system defaults work_reports, static_contexts and general, plus any custom types the team has added), not a fixed enum.
          schema:
            type: string
        - name: search
          in: query
          description: Search in title, description, and content
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort field
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
        - name: sort_order
          in: query
          description: Sort order
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Artifacts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not a team member)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Artifacts
  /api/v1/{team_id}/artifacts/stats:
    get:
      summary: Get artifact statistics
      description: Returns statistics about artifacts for the specified team
      operationId: getArtifactStats
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
      responses:
        '200':
          description: Artifact statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactStatsResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not a team member)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Artifacts
  /api/v1/{team_id}/artifacts/{project_id}:
    get:
      summary: List artifacts by project
      description: Retrieves artifacts for a specific project within the specified team
      operationId: listArtifactsByProject
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
        - name: project_id
          in: path
          required: true
          description: UUID of the project
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum:
              - active
              - draft
              - archived
        - name: type
          in: query
          description: Filter by type. An open string matched against the team's registered types (the system defaults work_reports, static_contexts and general, plus any custom types the team has added), not a fixed enum.
          schema:
            type: string
        - name: search
          in: query
          description: Search in title, description, and content
          schema:
            type: string
        - name: sort_by
          in: query
          description: Sort field
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - title
        - name: sort_order
          in: query
          description: Sort order
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Artifacts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not a team member)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Artifacts
  /api/v1/{team_id}/artifacts/{project_id}/{slug}:
