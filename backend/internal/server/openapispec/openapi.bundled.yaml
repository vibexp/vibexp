    TeamTopAccessedResourcesData:
      type: object
      required:
        - range
        - items
      properties:
        range:
          type: string
          enum:
            - 7d
            - 14d
            - 30d
            - 60d
            - 90d
            - 180d
          example: 30d
        items:
          type: array
          items:
            $ref: '#/components/schemas/TopAccessedResourceItem'
    EmailNotificationPreferences:
      type: object
      properties:
        platform_announcement:
          type: boolean
          description: Receive platform announcement emails
          example: true
        account_security:
          type: boolean
          description: Receive account security emails
          example: true
        new_feature:
          type: boolean
          description: Receive new feature emails
          example: true
        marketing_promotional:
          type: boolean
          description: Receive marketing and promotional emails
          example: false
      required:
        - platform_announcement
        - account_security
        - new_feature
        - marketing_promotional
    NotificationChannelPreferences:
      type: object
      properties:
        in_app:
          type: boolean
          description: Enable in-app notifications globally
          example: true
        email:
          type: boolean
          description: Enable email notifications globally
          example: true
        web_push:
          type: boolean
          description: Enable web push notifications globally
          example: false
      required:
        - in_app
        - email
        - web_push
    NotificationTypePreference:
      type: object
      properties:
        in_app:
          type: boolean
          description: Deliver this notification type in-app
          example: true
        email:
          type: string
          description: Email delivery mode for this notification type
          enum:
            - instant
            - digest
            - none
          example: digest
        web_push:
          type: boolean
          description: Deliver this notification type via web push
          example: true
      required:
        - in_app
        - email
        - web_push
    NotificationPreferences:
      type: object
      properties:
        channels:
          $ref: '#/components/schemas/NotificationChannelPreferences'
        types:
          type: object
          description: Per-type delivery preferences keyed by notification type (e.g. "feed.item.created", "feed.reply.created")
          additionalProperties:
            $ref: '#/components/schemas/NotificationTypePreference'
      required:
        - channels
        - types
    Preferences:
      type: object
      properties:
        email_notification:
          $ref: '#/components/schemas/EmailNotificationPreferences'
        notifications:
          $ref: '#/components/schemas/NotificationPreferences'
      required:
        - email_notification
        - notifications
