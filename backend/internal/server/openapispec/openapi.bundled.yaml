      operationId: listTypes
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team identifier
        - name: resource_type
          in: query
          required: true
          description: Resource whose types to list (currently only "artifacts")
          schema:
            type: string
      responses:
        '200':
          description: Types retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeListResponse'
        '400':
          description: Missing or unsupported resource_type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a member of the team
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to list types
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Types
    post:
      summary: Create a custom type
      description: |
        Creates a team-owned custom type for the given resource. The slug must be URL-safe (lowercase letters, numbers, hyphens) and unique within the team for the resource — a collision with a global default or an existing team type returns 409.
      operationId: createType
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
