      description: Returns the team's most-accessed resources over the requested window, ranked by access count descending and capped by the limit parameter, with each row's display name resolved so the frontend can render and deep-link it. Authorized via team membership.
      operationId: getTeamTopAccessedResources
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Team identifier
