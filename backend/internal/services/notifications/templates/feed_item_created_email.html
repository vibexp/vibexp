<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New post in your team feed</title>
</head>
<body style="font-family:sans-serif;color:#333;max-width:600px;margin:0 auto;padding:20px">
  <h2 style="color:#1a1a2e">New post in your team feed</h2>
  <p>{{index . "actor_name"}} posted to the team feed:</p>
  <blockquote style="border-left:4px solid #6366f1;margin:16px 0;padding:12px 16px;background:#f8f8ff">
    <strong>{{index . "title"}}</strong>
    {{if index . "body"}}
    <p style="margin:8px 0 0">{{index . "body"}}</p>
    {{end}}
  </blockquote>
  {{if index . "action_url"}}
  <p>
    <a href="{{index . "action_url"}}" style="background:#6366f1;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block">
      View post
    </a>
  </p>
  {{end}}
  <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
  <p style="font-size:12px;color:#999">You are receiving this because you are a member of this team on VibeXP.</p>
</body>
</html>
