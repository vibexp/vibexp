# Blueprint-related schemas for OpenAPI specification

# Core Blueprint model
Blueprint:
  type: object
  properties:
    id:
      type: string
      description: Unique identifier for the spec library
      example: "01234567-89ab-cdef-0123-456789abcdef"
    project_id:
      type: string
      format: uuid
      description: UUID of the project this spec library belongs to
      example: "01234567-89ab-cdef-0123-456789abcdef"
    slug:
      type: string
      description: Unique slug for the spec library within the project
      maxLength: 255
      example: "openapi-specification"
    user_id:
      type: string
      description: ID of the user who owns this spec library
      example: "user-123"
    content:
      type: string
      description: The actual content/specification of the spec library
      example: "openapi: 3.0.3\ninfo:\n  title: My API\n  version: 1.0.0..."
    created_at:
      type: string
      format: date-time
      description: Timestamp when the spec library was created
      example: "2024-01-15T10:30:00Z"
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the spec library was last updated
      example: "2024-01-15T14:30:00Z"
    status:
      type: string
      enum: [active, expired]
      description: Current status of the spec library
      example: "active"
    title:
      type: string
      description: Human-readable title for the spec library
      maxLength: 255
      example: "OpenAPI Specification"
    description:
      type: string
      description: Optional description of the spec library
      maxLength: 500
      example: "Complete OpenAPI specification for the REST API"
    type:
      type: string
      enum: [general, claude-code, claude, cursor, codex]
      description: Type category of the spec library
      example: "general"
    subtype:
      type: string
      enum: [sub-agents, skills, slash-commands, others, claude-md, agents, commands, rules, cursor-md, agents-md]
      description: Subtype category for specific type spec libraries
      example: "sub-agents"
    metadata:
      type: object
      additionalProperties: true
      description: Additional metadata as key-value pairs
      example:
        spec_type: "openapi"
        version: "3.0.3"
        tags: ["api", "rest", "specification"]
    path:
      type: string
      description: >-
        Canonical repo-relative path this blueprint materializes to. Derived from
        (type, subtype, slug) for VibeXP-authored blueprints, or the verbatim
        source path for imported ones.
      example: ".claude/skills/deploy/SKILL.md"
    content_sha:
      type: string
      description: SHA-256 (lowercase hex) of the raw content.
      example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    source:
      $ref: '#/BlueprintSource'
    related:
      type: array
      description: >-
        Depth-1 typed neighborhood of this resource — the relations touching it
        in both directions, newest first, capped at 20. Typed summaries only,
        never bodies. Populated on the detail GET; empty in list responses.
      items:
        $ref: './relations.yaml#/RelatedResource'
    similar:
      type: array
      description: >-
        Computed embedding-similarity neighborhood of this resource (up to 5),
        derived live at read time from vector similarity — NOT stored edges and
        distinct from `related`. Populated on the detail GET; empty otherwise.
      items:
        $ref: './relations.yaml#/SimilarResource'
  required:
    - id
    - project_id
    - slug
    - user_id
    - content
    - created_at
    - updated_at
    - status
    - title
    - type
    - path
    - related

# Read-only import provenance for a blueprint (server-set on import; absent for
# VibeXP-authored blueprints).
BlueprintSource:
  type: object
  description: Read-only import provenance; present only for imported blueprints.
  properties:
    repo:
      type: string
      description: Source repository URL the blueprint was imported from.
      example: "https://github.com/vibexp/vibexp"
    commit_sha:
      type: string
      description: Head commit SHA of the branch at import time.
      example: "6706920221608..."
    blob_sha:
      type: string
      description: Git blob SHA of the source file at import time.
      example: "blobsha123..."
    imported_at:
      type: string
      format: date-time
      description: Timestamp when the blueprint was imported.
      example: "2024-01-15T10:30:00Z"

# Detail response for a single blueprint: the core Blueprint plus raw_content,
# which is returned only on the detail GET (omitted from list responses).
BlueprintDetail:
  allOf:
    - $ref: '#/Blueprint'
    - type: object
      properties:
        raw_content:
          type: string
          description: >-
            Original raw bytes of the blueprint (frontmatter + body). Returned
            only on the detail GET, never in list responses.
          example: "---\nname: Deploy\n---\nBody"

# Request model for creating spec libraries
CreateBlueprintRequest:
  type: object
  properties:
    project_id:
      type: string
      format: uuid
      description: UUID of the project this spec library belongs to
      example: "01234567-89ab-cdef-0123-456789abcdef"
    slug:
      type: string
      description: Unique slug for the spec library within the project
      maxLength: 255
      minLength: 1
      example: "openapi-specification"
    content:
      type: string
      description: The actual content/specification of the spec library
      minLength: 1
      example: "openapi: 3.0.3\ninfo:\n  title: My API\n  version: 1.0.0..."
    title:
      type: string
      description: Human-readable title for the spec library
      maxLength: 255
      minLength: 1
      example: "OpenAPI Specification"
    description:
      type: string
      description: Optional description of the spec library
      maxLength: 500
      example: "Complete OpenAPI specification for the REST API"
    type:
      type: string
      enum: [general, claude-code, claude, cursor, codex]
      description: Type category of the spec library
      default: "general"
      example: "general"
    subtype:
      type: string
      enum: [sub-agents, skills, slash-commands, others, claude-md, agents, commands, rules, cursor-md, agents-md]
      description: Subtype category for specific type spec libraries
      example: "sub-agents"
    status:
      type: string
      enum: [active, expired]
      description: Initial status of the spec library
      default: "active"
      example: "active"
    metadata:
      type: object
      additionalProperties: true
      description: Additional metadata as key-value pairs
      example:
        spec_type: "openapi"
        version: "3.0.3"
        tags: ["api", "rest", "specification"]
    path:
      type: string
      maxLength: 1024
      description: >-
        Optional repo-relative path to freeze for this blueprint. When omitted a
        default is derived from (type, subtype, slug). Must be relative — no
        leading "/", no "..", no backslashes.
      example: ".claude/skills/deploy/SKILL.md"
  required:
    - slug
    - content
    - title

# Request model for updating spec libraries
UpdateBlueprintRequest:
  type: object
  properties:
    project_id:
      type: string
      format: uuid
      description: New project UUID for the spec library
      example: "01234567-89ab-cdef-0123-456789abcdef"
    slug:
      type: string
      description: New slug for the spec library
      maxLength: 255
      minLength: 1
      example: "updated-openapi-specification"
    content:
      type: string
      description: Updated content/specification of the spec library
      example: "openapi: 3.0.3\ninfo:\n  title: My Updated API\n  version: 2.0.0..."
    title:
      type: string
      description: Updated title for the spec library
      maxLength: 255
      minLength: 1
      example: "Updated OpenAPI Specification"
    description:
      type: string
      description: Updated description of the spec library
      maxLength: 500
      example: "Updated complete OpenAPI specification for the REST API"
    type:
      type: string
      enum: [general, claude-code, claude, cursor, codex]
      description: Updated type category of the spec library
      example: "general"
    subtype:
      type: string
      enum: [sub-agents, skills, slash-commands, others, claude-md, agents, commands, rules, cursor-md, agents-md]
      description: Updated subtype category for specific type spec libraries
      example: "sub-agents"
    status:
      type: string
      enum: [active, expired]
      description: Updated status of the spec library
      example: "active"
    metadata:
      type: object
      additionalProperties: true
      description: Updated metadata as key-value pairs
      example:
        spec_type: "openapi"
        version: "3.1.0"
        tags: ["api", "rest", "specification", "updated"]
    path:
      type: string
      maxLength: 1024
      description: >-
        Optional repo-relative path override; freezes the blueprint's path. Must
        be relative — no leading "/", no "..", no backslashes.
      example: ".claude/skills/deploy/SKILL.md"

# Response model for spec library lists
BlueprintListResponse:
  type: object
  properties:
    blueprints:
      type: array
      items:
        $ref: '#/Blueprint'
      description: List of spec libraries
    total_count:
      type: integer
      description: Total number of spec libraries matching the filter criteria
      example: 42
    page:
      type: integer
      description: Current page number
      example: 1
    per_page:
      type: integer
      description: Number of items per page
      example: 20
    total_pages:
      type: integer
      description: Total number of pages
      example: 3
  required:
    - blueprints
    - total_count
    - page
    - per_page
    - total_pages

# Response model for spec library statistics
BlueprintStatsResponse:
  type: object
  properties:
    total_projects:
      type: integer
      description: Total number of projects with spec libraries
      example: 5
    total_blueprints:
      type: integer
      description: Total number of blueprints
      example: 42
    added_this_week:
      type: integer
      description: Number of spec libraries added in the current week
      example: 3
    total_by_type:
      type: object
      additionalProperties:
        type: integer
      description: Count of spec libraries by type
      example:
        general: 42
    total_by_status:
      type: object
      additionalProperties:
        type: integer
      description: Count of spec libraries by status
      example:
        active: 35
        expired: 7
  required:
    - total_projects
    - total_blueprints
    - added_this_week
    - total_by_type
    - total_by_status

# Response model for the blueprint version-history listing endpoint: a single object
# with a versions array (newest-first). Reuses the generic ContentVersion snapshot
# (defined in artifacts.yaml) so the shared versioning core is left untouched.
BlueprintVersionListResponse:
  type: object
  properties:
    versions:
      type: array
      items:
        $ref: './artifacts.yaml#/ContentVersion'
      description: Content-version snapshots for the blueprint, newest first
  required:
    - versions
