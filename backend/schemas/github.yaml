# GitHub integration-related schemas for OpenAPI specification

# GitHub installation status
GitHubInstallationStatus:
  type: object
  description: Status of the GitHub App installation for a team
  properties:
    installed:
      type: boolean
      description: Whether the GitHub App is installed for the team
      example: true
    account_login:
      type: string
      description: GitHub account or organization login that installed the app (present when installed is true)
      example: "my-org"
    installation_id:
      type: integer
      format: int64
      description: GitHub installation ID (present when installed is true)
      example: 12345678
    suspended:
      type: boolean
      description: Whether the installation is currently suspended
      example: false
    installed_at:
      type: string
      format: date-time
      description: When the GitHub App was installed (present when installed is true)
      example: "2024-01-15T10:30:00Z"
  required:
    - installed

# Individual GitHub repository
GitHubRepository:
  type: object
  description: A GitHub repository accessible by the installation
  properties:
    id:
      type: integer
      format: int64
      description: GitHub repository ID
      example: 123456789
    name:
      type: string
      description: Repository name (without owner)
      example: "my-repo"
    full_name:
      type: string
      description: Full repository name including owner (owner/repo)
      example: "my-org/my-repo"
    description:
      type: string
      nullable: true
      description: Repository description
      example: "A sample repository"
    private:
      type: boolean
      description: Whether the repository is private
      example: false
    html_url:
      type: string
      description: GitHub web URL for the repository
      example: "https://github.com/my-org/my-repo"
    owner:
      type: object
      description: Repository owner information
      properties:
        login:
          type: string
          description: Owner's GitHub login
          example: "my-org"
        type:
          type: string
          description: Owner type (User or Organization)
          enum: [User, Organization]
          example: "Organization"
      required:
        - login
        - type
    imported_project_slug:
      type: string
      description: Slug of the existing VibeXP project imported from this repository (when the repo's html_url matches an existing project's git_url within the team). Omitted/empty when no matching project exists.
      example: "my-repo"
  required:
    - id
    - name
    - full_name
    - private
    - html_url
    - owner

# Paginated list of GitHub repositories
GitHubRepositoriesResponse:
  type: object
  description: Paginated list of GitHub repositories accessible by the installation
  properties:
    repositories:
      type: array
      items:
        $ref: "#/GitHubRepository"
      description: List of repositories for the current page
    total_count:
      type: integer
      description: Total number of repositories accessible by the installation
      example: 42
    page:
      type: integer
      description: Current page number (1-based)
      example: 1
    per_page:
      type: integer
      description: Number of items per page
      example: 100
  required:
    - repositories
    - total_count
    - page
    - per_page

# Response from GitHub OAuth callback
GitHubCallbackResponse:
  type: object
  description: Response returned after successfully completing the GitHub App installation callback
  properties:
    reconnected:
      type: boolean
      description: Whether this was a reconnection to an existing installation (true) or a new installation (false)
      example: false
  required:
    - reconnected

# Response containing GitHub App install URL
GitHubInstallURL:
  type: object
  description: GitHub App installation URL with CSRF protection state parameter
  properties:
    install_url:
      type: string
      description: URL to redirect the user to for installing the GitHub App
      example: "https://github.com/apps/vibexp-app/installations/new?state=team-id%3A1234567890%3Asignature"
  required:
    - install_url

# Failed blueprint import item
BlueprintImportFailed:
  type: object
  description: Details of a file that failed to be imported as a blueprint
  properties:
    file_path:
      type: string
      description: Path of the file that failed to import
      example: ".claude/agents/my-agent.md"
    error:
      type: string
      description: Generic error message (internal details are not exposed)
      example: "failed to import blueprint"
  required:
    - file_path
    - error

# Successfully imported blueprint item
BlueprintImportSuccess:
  type: object
  description: Details of a file successfully imported as a blueprint
  properties:
    file_path:
      type: string
      description: Path of the file that was imported
      example: ".claude/agents/my-agent.md"
    blueprint_id:
      type: string
      description: ID of the created blueprint
      example: "01234567-89ab-cdef-0123-456789abcdef"
    title:
      type: string
      description: Title of the created blueprint
      example: "my-agent from my-repo"
    type:
      type: string
      description: Blueprint type
      example: "claude-code"
    subtype:
      type: string
      description: Blueprint subtype
      example: "sub-agents"
  required:
    - file_path
    - blueprint_id
    - title
    - type

# Skipped blueprint import item
BlueprintImportSkipped:
  type: object
  description: Details of a file that was skipped during blueprint import
  properties:
    file_path:
      type: string
      description: Path of the file that was skipped
      example: ".claude/agents/script.py"
    reason:
      type: string
      description: Human-readable reason why the file was skipped
      example: "Not a markdown file"
  required:
    - file_path
    - reason

# Blueprint import report
BlueprintImportReport:
  type: object
  description: Summary report of a blueprint import operation
  properties:
    total_scanned:
      type: integer
      description: Total number of files scanned during the import
      example: 10
    total_successful:
      type: integer
      description: Number of files successfully imported as blueprints
      example: 7
    total_failed:
      type: integer
      description: Number of files that failed to import
      example: 1
    total_skipped:
      type: integer
      description: Number of files skipped (non-markdown, empty, too large, or already exists)
      example: 2
    failed_items:
      type: array
      items:
        $ref: "#/BlueprintImportFailed"
      description: Details of files that failed to import
    successful_items:
      type: array
      items:
        $ref: "#/BlueprintImportSuccess"
      description: Details of files successfully imported
    skipped_items:
      type: array
      items:
        $ref: "#/BlueprintImportSkipped"
      description: Details of files that were skipped
    total_updated:
      type: integer
      description: Number of blueprints refreshed from a changed repo file (unedited in VibeXP)
      example: 1
    total_conflicts:
      type: integer
      description: Number of blueprints left untouched because they were edited in VibeXP
      example: 1
    total_up_to_date:
      type: integer
      description: Number of blueprints whose repo file was unchanged (no-op)
      example: 3
    updated_items:
      type: array
      items:
        $ref: "#/BlueprintImportUpdated"
      description: Details of blueprints refreshed from a changed repo file
    conflict_items:
      type: array
      items:
        $ref: "#/BlueprintImportConflict"
      description: Details of blueprints left untouched due to a VibeXP edit
    up_to_date_items:
      type: array
      items:
        $ref: "#/BlueprintImportUpToDate"
      description: Details of blueprints whose repo file was unchanged
    total_companions_imported:
      type: integer
      description: Number of Agent Skill companion files stored as attachments (newly imported or replaced on re-import)
      example: 2
    total_companions_removed:
      type: integer
      description: Number of companion files deleted during re-import reconciliation (absent from the re-imported skill)
      example: 1
    total_companions_skipped:
      type: integer
      description: Number of companion files rejected by the attachment service (oversized, over the per-owner budget, disallowed type, or storage unconfigured)
      example: 1
    companion_items:
      type: array
      items:
        $ref: "#/BlueprintImportCompanion"
      description: Per-file outcomes for Agent Skill companion files, distinct from the blueprint (SKILL.md) outcomes
  required:
    - total_scanned
    - total_successful
    - total_failed
    - total_skipped
    - failed_items
    - successful_items
    - skipped_items
    - total_updated
    - total_conflicts
    - total_up_to_date
    - updated_items
    - conflict_items
    - up_to_date_items
    - total_companions_imported
    - total_companions_removed
    - total_companions_skipped
    - companion_items

BlueprintImportCompanion:
  type: object
  description: >-
    Per-file outcome of importing one Agent Skill companion file (a sibling of a
    SKILL.md) as a blueprint-owned attachment.
  properties:
    blueprint_id:
      type: string
      description: ID of the blueprint (imported SKILL.md) that owns this companion
      example: "01234567-89ab-cdef-0123-456789abcdef"
    relative_path:
      type: string
      description: Path of the companion file relative to the skill directory
      example: "scripts/helper.txt"
    outcome:
      type: string
      description: What happened to the companion file during import
      enum:
        - imported
        - updated
        - removed
        - skipped
      example: "imported"
    reason:
      type: string
      description: Why the companion was skipped (present only when outcome is "skipped")
      example: "File type is not allowed"
  required:
    - blueprint_id
    - relative_path
    - outcome

BlueprintImportUpdated:
  type: object
  description: A blueprint refreshed from a changed repo file during re-import
  properties:
    file_path:
      type: string
      example: ".claude/agents/reviewer.md"
    blueprint_id:
      type: string
      example: "01234567-89ab-cdef-0123-456789abcdef"
    title:
      type: string
      example: "Reviewer"
    type:
      type: string
      example: "claude-code"
    subtype:
      type: string
      example: "sub-agents"
  required:
    - file_path
    - blueprint_id
    - title
    - type

BlueprintImportConflict:
  type: object
  description: A blueprint left untouched during re-import because it was edited in VibeXP
  properties:
    file_path:
      type: string
      example: ".claude/agents/reviewer.md"
    blueprint_id:
      type: string
      example: "01234567-89ab-cdef-0123-456789abcdef"
    reason:
      type: string
      example: "Blueprint was edited in VibeXP; re-import skipped to avoid overwriting local changes"
  required:
    - file_path
    - blueprint_id
    - reason

BlueprintImportUpToDate:
  type: object
  description: A blueprint whose repo file was unchanged since import (re-import no-op)
  properties:
    file_path:
      type: string
      example: ".claude/agents/reviewer.md"
    blueprint_id:
      type: string
      example: "01234567-89ab-cdef-0123-456789abcdef"
  required:
    - file_path
    - blueprint_id
