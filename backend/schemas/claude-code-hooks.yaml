    tool_name:
      type: string
      nullable: true
      description: Name of the tool being used
      example: "shell"
    workspace_roots:
      type: array
      items:
        type: string
      description: Workspace root directories
      example: ["/home/user/project"]
    configuration:
      type: object
      nullable: true
      description: Hook configuration data
      additionalProperties: true
    reference:
      type: object
      nullable: true
      description: Reference data
      additionalProperties: true
    context:
      type: object
      nullable: true
