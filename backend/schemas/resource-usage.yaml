ResourceUsageItem:
  type: object
  properties:
    resource_type:
      type: string
      description: Type of resource (e.g., prompt, memory, artifact)
      example: "prompt"
    count:
      type: integer
      description: Current usage count
      example: 5
    limit:
      type: integer
      description: Maximum allowed for the subscription plan
      example: 20
    percentage:
      type: integer
      description: Usage percentage
      example: 25

ResourceUsageResponse:
  type: object
  properties:
    user_id:
      type: string
      format: uuid
      description: ID of the user
      example: "f3a1b20c-e2d3-4e4f-a5f6-d7c8b9a0b1c2"
    period_start:
      type: string
      format: date-time
      description: Start of the subscription period
      example: "2025-10-01T00:00:00Z"
    period_end:
      type: string
      format: date-time
      description: End of the subscription period
      example: "2025-10-31T23:59:59Z"
    resources:
      type: array
      description: List of resource usage items
      items:
        $ref: "#/ResourceUsageItem"
