# Admin (instance-level) schemas for the /api/v1/admin surface. This surface is
# guarded by instance-admin authorization at the transport layer.

AdminInstanceCounts:
  type: object
  description: Instance-wide totals for the top-level entities (unscoped counts).
  required:
    - users
    - teams
    - prompts
    - artifacts
    - memories
  properties:
    users:
      type: integer
      format: int64
      description: Total number of user accounts.
      example: 42
    teams:
      type: integer
      format: int64
      description: Total number of teams.
      example: 12
    prompts:
      type: integer
      format: int64
      description: Total number of prompts.
      example: 340
    artifacts:
      type: integer
      format: int64
      description: Total number of artifacts.
      example: 128
    memories:
      type: integer
      format: int64
      description: Total number of memories.
      example: 512

AdminStatsResponse:
  type: object
  description: Instance statistics returned by GET /api/v1/admin/stats.
  required:
    - counts
    - version
  properties:
    counts:
      $ref: '#/AdminInstanceCounts'
    version:
      type: string
      description: The running backend application version (config server.service_version; "dev" when unset).
      example: "1.2.3"

AdminUserListItem:
  type: object
  description: One user in the instance-wide admin user listing.
  required:
    - id
    - email
    - name
    - status
    - created_at
    - team_count
  properties:
    id:
      type: string
      format: uuid
      example: "user_123"
    email:
      type: string
      format: email
      example: "user@example.com"
    name:
      type: string
      example: "John Doe"
    idp_provider:
      type: string
      nullable: true
      description: Identity provider name (e.g. "google", "oidc"); null for accounts without one.
      example: "oidc"
    status:
      type: string
      enum:
        - active
        - suspended
      description: |
        Account lifecycle. A suspended account is rejected at every
        authentication entry point — existing sessions, API keys and MCP/OAuth
        tokens stop working immediately, not at expiry. Instance-local: it does
        not disable the account at the upstream identity provider.
      example: "active"
    created_at:
      type: string
      format: date-time
    team_count:
      type: integer
      format: int64
      description: Number of teams the user belongs to.
      example: 3

AdminUserListResponse:
  type: object
  description: A page of the instance-wide user listing, newest first.
  required:
    - users
    - total_count
    - page
    - per_page
    - total_pages
  properties:
    users:
      type: array
      description: Users on this page, newest first.
      items:
        $ref: '#/AdminUserListItem'
    total_count:
      type: integer
      description: Total number of users across the instance.
      example: 128
    page:
      type: integer
      description: Current page number.
      example: 1
    per_page:
      type: integer
      description: Number of items per page.
      example: 20
    total_pages:
      type: integer
      description: Total number of pages.
      example: 7

AdminTeamMembership:
  type: object
  description: A team the user belongs to, with the user's role in that team.
  required:
    - team_id
    - team_name
    - role
  properties:
    team_id:
      type: string
      format: uuid
      example: "team_abc123"
    team_name:
      type: string
      example: "Acme Engineering"
    role:
      type: string
      description: The user's role in the team (owner, admin, or member).
      example: "member"

AdminUserDetail:
  type: object
  description: A single user with their team memberships (GET /api/v1/admin/users/{id}).
  required:
    - id
    - email
    - name
    - status
    - created_at
    - memberships
  properties:
    id:
      type: string
      format: uuid
      example: "user_123"
    email:
      type: string
      format: email
      example: "user@example.com"
    name:
      type: string
      example: "John Doe"
    idp_provider:
      type: string
      nullable: true
      description: Identity provider name (e.g. "google", "oidc"); null for accounts without one.
      example: "oidc"
    status:
      type: string
      enum:
        - active
        - suspended
      description: |
        Account lifecycle. A suspended account is rejected at every
        authentication entry point — existing sessions, API keys and MCP/OAuth
        tokens stop working immediately, not at expiry. Instance-local: it does
        not disable the account at the upstream identity provider.
      example: "active"
    created_at:
      type: string
      format: date-time
    memberships:
      type: array
      description: Teams the user belongs to.
      items:
        $ref: '#/AdminTeamMembership'

AdminTeamOwner:
  type: object
  description: The owning user of a team.
  required:
    - id
    - email
    - name
  properties:
    id:
      type: string
      format: uuid
      example: "user_123"
    email:
      type: string
      format: email
      example: "owner@example.com"
    name:
      type: string
      example: "Jane Owner"

AdminTeamListItem:
  type: object
  description: One team in the instance-wide admin team listing.
  required:
    - id
    - name
    - slug
    - is_personal
    - owner
    - member_count
    - created_at
  properties:
    id:
      type: string
      format: uuid
      example: "team_abc123"
    name:
      type: string
      example: "Acme Engineering"
    slug:
      type: string
      description: URL-safe team identifier.
      example: "acme-engineering"
    is_personal:
      type: boolean
      description: True for a user's default personal workspace, false for a shared team workspace.
      example: false
    owner:
      $ref: '#/AdminTeamOwner'
    member_count:
      type: integer
      format: int64
      description: Number of members in the team.
      example: 8
    created_at:
      type: string
      format: date-time

AdminTeamListResponse:
  type: object
  description: A page of the instance-wide team listing, newest first.
  required:
    - teams
    - total_count
    - page
    - per_page
    - total_pages
  properties:
    teams:
      type: array
      description: Teams on this page, newest first.
      items:
        $ref: '#/AdminTeamListItem'
    total_count:
      type: integer
      description: Total number of teams across the instance.
      example: 12
    page:
      type: integer
      example: 1
    per_page:
      type: integer
      example: 20
    total_pages:
      type: integer
      example: 1

AdminTeamMember:
  type: object
  description: One member of a team, with the member's role and join time.
  required:
    - user_id
    - email
    - name
    - role
    - joined_at
  properties:
    user_id:
      type: string
      format: uuid
      example: "user_123"
    email:
      type: string
      format: email
      example: "member@example.com"
    name:
      type: string
      example: "John Member"
    role:
      type: string
      description: The member's role in the team (owner, admin, or member).
      example: "member"
    joined_at:
      type: string
      format: date-time

AdminTeamDetail:
  type: object
  description: A single team with its owner and member list (GET /api/v1/admin/teams/{id}).
  required:
    - id
    - name
    - slug
    - is_personal
    - owner
    - created_at
    - members
  properties:
    id:
      type: string
      format: uuid
      example: "team_abc123"
    name:
      type: string
      example: "Acme Engineering"
    slug:
      type: string
      description: URL-safe team identifier.
      example: "acme-engineering"
    is_personal:
      type: boolean
      description: True for a user's default personal workspace, false for a shared team workspace.
      example: false
    owner:
      $ref: '#/AdminTeamOwner'
    created_at:
      type: string
      format: date-time
    members:
      type: array
      description: The team's members.
      items:
        $ref: '#/AdminTeamMember'

# ---------------------------------------------------------------------------
# Dashboard metrics (#451). Computed on demand — no rollup/snapshot tables.
# ---------------------------------------------------------------------------

AdminExtendedCounts:
  type: object
  description: |
    Instance-wide totals for every top-level entity. A superset of
    AdminInstanceCounts, which stays as-is for the legacy stats endpoint.
  required:
    - users
    - teams
    - projects
    - prompts
    - artifacts
    - memories
    - blueprints
    - agents
    - feeds
    - api_keys
  properties:
    users:
      type: integer
      format: int64
      example: 42
    teams:
      type: integer
      format: int64
      example: 12
    projects:
      type: integer
      format: int64
      example: 30
    prompts:
      type: integer
      format: int64
      example: 340
    artifacts:
      type: integer
      format: int64
      example: 128
    memories:
      type: integer
      format: int64
      example: 512
    blueprints:
      type: integer
      format: int64
      example: 64
    agents:
      type: integer
      format: int64
      example: 9
    feeds:
      type: integer
      format: int64
      example: 4
    api_keys:
      type: integer
      format: int64
      example: 17

AdminBreakdownBucket:
  type: object
  description: One value of a grouped column plus how many rows carry it.
  required:
    - value
    - count
  properties:
    value:
      type: string
      description: The column value. NULL values are reported as an empty string.
      example: "active"
    count:
      type: integer
      format: int64
      example: 120

AdminEntityBreakdown:
  type: object
  description: A GROUP BY over one status/type column of one entity table.
  required:
    - entity
    - field
    - buckets
  properties:
    entity:
      type: string
      description: The entity table the breakdown covers.
      example: "prompts"
    field:
      type: string
      description: The grouped column.
      example: "status"
    buckets:
      type: array
      description: One entry per distinct value, most frequent first.
      items:
        $ref: '#/AdminBreakdownBucket'

AdminTableStat:
  type: object
  description: Approximate row count for one table.
  required:
    - table
    - estimated_rows
  properties:
    table:
      type: string
      example: "prompts"
    estimated_rows:
      type: integer
      format: int64
      description: |
        ESTIMATE from pg_stat_user_tables.n_live_tup, not an exact COUNT(*) —
        an exact per-table count does not scale and this figure is only meant
        for relative sizing. Freshness depends on autovacuum/ANALYZE.
      example: 34012

AdminSystemHealth:
  type: object
  description: Instance storage health.
  required:
    - database_size_bytes
    - tables
  properties:
    database_size_bytes:
      type: integer
      format: int64
      description: pg_database_size(current_database()).
      example: 184549376
    tables:
      type: array
      description: Per-table estimated row counts, largest first.
      items:
        $ref: '#/AdminTableStat'

AdminDashboardOverview:
  type: object
  description: Totals, breakdowns and system health (GET /api/v1/admin/dashboard/overview).
  required:
    - counts
    - breakdowns
    - system_health
    - version
  properties:
    counts:
      $ref: '#/AdminExtendedCounts'
    breakdowns:
      type: array
      description: One entry per entity/column pair that has a status or type column.
      items:
        $ref: '#/AdminEntityBreakdown'
    system_health:
      $ref: '#/AdminSystemHealth'
    version:
      type: string
      description: The running backend application version ("dev" when unset).
      example: "1.2.3"

AdminGrowthPoint:
  type: object
  description: New rows created per entity within one time bucket.
  required:
    - bucket
    - users
    - teams
    - projects
    - prompts
    - artifacts
    - memories
  properties:
    bucket:
      type: string
      format: date-time
      description: Start of the bucket, in UTC.
    users:
      type: integer
      format: int64
    teams:
      type: integer
      format: int64
    projects:
      type: integer
      format: int64
    prompts:
      type: integer
      format: int64
    artifacts:
      type: integer
      format: int64
    memories:
      type: integer
      format: int64

AdminCountPoint:
  type: object
  description: A single count within one time bucket.
  required:
    - bucket
    - count
  properties:
    bucket:
      type: string
      format: date-time
      description: Start of the bucket, in UTC.
    count:
      type: integer
      format: int64

AdminSourcePoint:
  type: object
  description: A count for one access source within one time bucket.
  required:
    - bucket
    - source
    - count
  properties:
    bucket:
      type: string
      format: date-time
      description: Start of the bucket, in UTC.
    source:
      type: string
      description: Access source (e.g. "web", "cli", "mcp").
      example: "mcp"
    count:
      type: integer
      format: int64

AdminDataWindow:
  type: object
  description: |
    Earliest instant for which event data still exists. Both source tables are
    TTL-pruned (config retention.activity_days / retention.access_event_days),
    so a chart asking for a range older than these values will legitimately show
    zeros rather than missing data.
  required:
    - sign_ins_earliest_retained_at
    - access_by_source_earliest_retained_at
  properties:
    sign_ins_earliest_retained_at:
      type: string
      format: date-time
      description: now() - retention.activity_days.
    access_by_source_earliest_retained_at:
      type: string
      format: date-time
      description: now() - retention.access_event_days.

AdminTimeseriesResponse:
  type: object
  description: |
    Bucketed metrics over a time range (GET /api/v1/admin/dashboard/timeseries).
    Every bucket in the requested range is present in every series with an
    explicit 0 — the series are gap-filled, never sparse.
  required:
    - from
    - to
    - granularity
    - growth
    - sign_ins
    - access_by_source
    - data_window
  properties:
    from:
      type: string
      format: date-time
      description: |
        Inclusive start of the range actually used. This is snapped DOWN to the
        start of its bucket, so it may precede the requested `from` (asking for
        2026-07-15 at month granularity reports and queries 2026-07-01). Buckets
        are therefore always whole, never partial at the head.
    to:
      type: string
      format: date-time
      description: |
        Exclusive end of the range actually used (after defaulting). This is NOT
        snapped, so the final bucket may cover only part of its period.
    granularity:
      type: string
      enum:
        - day
        - week
        - month
      description: Bucket size actually used.
    growth:
      type: array
      description: New entities per bucket, ascending by bucket.
      items:
        $ref: '#/AdminGrowthPoint'
    sign_ins:
      type: array
      description: Successful sign-ins per bucket (activities.auth_login), ascending.
      items:
        $ref: '#/AdminCountPoint'
    access_by_source:
      type: array
      description: |
        Resource accesses per bucket per source, ascending by bucket then source.
        Only sources actually observed in the range appear; a source with no
        events in a bucket is gap-filled to 0 for the sources that do appear.
      items:
        $ref: '#/AdminSourcePoint'
    data_window:
      $ref: '#/AdminDataWindow'
