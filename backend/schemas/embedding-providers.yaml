# Embedding provider management schemas

EmbeddingProvider:
  type: object
  properties:
    id:
      type: string
      example: "provider_123"
    user_id:
      type: string
      example: "user_123"
    team_id:
      type: string
      format: uuid
      nullable: true
      description: Team that owns this provider.
      example: "b1234567-89ab-cdef-0123-456789abcdef"
    name:
      type: string
      example: "OpenAI Embeddings"
    provider_type:
      type: string
      example: "openai"
    model:
      type: string
      description: >-
        Embedding model this provider requests. Must return the fixed vector
        width VibeXP stores (1024).
      example: "text-embedding-3-small"
    chunk_size:
      type: integer
      description: In-Go text-chunker size used when embedding documents.
      example: 1000
    chunk_overlap:
      type: integer
      description: Overlap between adjacent chunks.
      example: 200
    concurrency:
      type: integer
      description: >-
        Maximum number of simultaneous embedding requests VibeXP issues to this
        provider. Keep at 1 for single-threaded providers.
      example: 1
    query_prefix:
      type: string
      nullable: true
      description: >-
        Instruction prefix prepended to search queries before they are embedded
        (only the text sent to the provider; nothing extra is stored).
        Asymmetric models require this — e.g. mxbai/BGE English expect
        "Represent this sentence for searching relevant passages: ", E5 expects
        "query: ". Empty/null means no prefix (default behaviour).
      example: "Represent this sentence for searching relevant passages: "
    document_prefix:
      type: string
      nullable: true
      description: >-
        Instruction prefix prepended to document chunks before they are embedded
        (applied only to the text sent to the provider; the stored chunk content
        is unchanged). E5 expects "passage: "; mxbai/BGE embed documents raw.
        Changing this invalidates stored vectors and triggers a team re-embed.
        Empty/null means no prefix (default behaviour).
      example: "passage: "
    is_default:
      type: boolean
      example: false
    base_url:
      type: string
      format: uri
      nullable: true
      example: "https://api.openai.com/v1"
    configuration:
      type: string
      example: "{\"model\": \"text-embedding-ada-002\"}"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    version:
      type: integer
      format: int64
      description: >-
        Optimistic-concurrency version counter, incremented on each update.
        Note: create responses currently return 0 (the persisted row starts
        at 1) — read it from get/list/update responses instead.
      example: 1
  required:
    - id
    - user_id
    - name
    - provider_type
    - model
    - chunk_size
    - chunk_overlap
    - concurrency
    - is_default
    - configuration
    - created_at
    - updated_at
    - version

EmbeddingProviderResponse:
  allOf:
    - $ref: '#/EmbeddingProvider'
    - type: object
      properties:
        has_api_key:
          type: boolean
          example: true
      required:
        - has_api_key

CreateEmbeddingProviderRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
      example: "OpenAI Embeddings"
    provider_type:
      type: string
      example: "openai"
    model:
      type: string
      minLength: 1
      maxLength: 255
      description: Embedding model that must return 1024-dimensional vectors.
      example: "text-embedding-3-small"
    chunk_size:
      type: integer
      minimum: 1
      description: Optional chunker size; defaults to 1000 when omitted.
      example: 1000
    chunk_overlap:
      type: integer
      minimum: 0
      description: Optional chunk overlap; defaults to 200 when omitted.
      example: 200
    concurrency:
      type: integer
      minimum: 1
      description: >-
        Optional max simultaneous embedding requests to this provider; defaults
        to 1 when omitted.
      example: 1
    query_prefix:
      type: string
      nullable: true
      maxLength: 256
      description: >-
        Optional instruction prefix prepended to search queries before
        embedding. Defaults to empty (no prefix) when omitted.
      example: "Represent this sentence for searching relevant passages: "
    document_prefix:
      type: string
      nullable: true
      maxLength: 256
      description: >-
        Optional instruction prefix prepended to document chunks before
        embedding. Defaults to empty (no prefix) when omitted.
      example: "passage: "
    is_default:
      type: boolean
      example: false
    base_url:
      type: string
      format: uri
      example: "https://api.openai.com/v1"
    api_key:
      type: string
      nullable: true
    configuration:
      type: object
      additionalProperties: true
  required:
    - name
    - provider_type
    - model

UpdateEmbeddingProviderRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    provider_type:
      type: string
    model:
      type: string
      minLength: 1
      maxLength: 255
    chunk_size:
      type: integer
      minimum: 1
    chunk_overlap:
      type: integer
      minimum: 0
    concurrency:
      type: integer
      minimum: 1
    query_prefix:
      type: string
      nullable: true
      maxLength: 256
      description: >-
        Instruction prefix prepended to search queries before embedding.
        Send an empty string to clear a previously configured prefix.
    document_prefix:
      type: string
      nullable: true
      maxLength: 256
      description: >-
        Instruction prefix prepended to document chunks before embedding.
        Changing it triggers a team re-embed. Send an empty string to clear.
    is_default:
      type: boolean
    base_url:
      type: string
      format: uri
    api_key:
      type: string
    configuration:
      type: object
      additionalProperties: true

EmbeddingProviderListResponse:
  type: object
  properties:
    embedding_providers:
      type: array
      items:
        $ref: '#/EmbeddingProviderResponse'
    total_count:
      type: integer
    page:
      type: integer
    per_page:
      type: integer
    total_pages:
      type: integer
  required:
    - embedding_providers
    - total_count
    - page
    - per_page
    - total_pages

ValidateEmbeddingProviderRequest:
  type: object
  properties:
    provider_type:
      type: string
      example: "openai_compatible"
    model:
      type: string
      description: >-
        Embedding model to probe. The provider is accepted only if it returns
        vectors of the fixed dimension VibeXP stores (1024).
      example: "text-embedding-3-small"
    base_url:
      type: string
      format: uri
      example: "https://api.openai.com/v1"
    api_key:
      type: string
      nullable: true
    configuration:
      type: object
      additionalProperties: true
  required:
    - provider_type
    - model
    - base_url

ValidateEmbeddingProviderResponse:
  type: object
  properties:
    is_valid:
      type: boolean
      example: true
    message:
      type: string
      example: "Provider configuration is valid"
    details:
      type: object
      properties:
        response_time_ms:
          type: integer
          example: 150
        status_code:
          type: integer
          example: 200
        dimension:
          type: integer
          description: Vector width the provider returned during the probe.
          example: 1024
        error_details:
          type: string
          example: "Connection timeout"
  required:
    - is_valid
    - message

EmbeddingCoverageItem:
  type: object
  description: >-
    Embedding coverage for a single entity type: how many entities exist, how
    many have an embedding under the team's active model, how many are still
    pending, and the embedded percentage.
  properties:
    entity_type:
      type: string
      description: The embeddable entity type this row reports on.
      enum:
        - prompt
        - artifact
        - memory
        - blueprint
        - feed_item
      example: "prompt"
    total:
      type: integer
      format: int64
      description: Total embeddable entities of this type owned by the team.
      example: 120
    embedded:
      type: integer
      format: int64
      description: >-
        Entities of this type that already have an embedding under the team's
        active model.
      example: 90
    pending:
      type: integer
      format: int64
      description: Entities still missing an embedding (total − embedded).
      example: 30
    embedded_percent:
      type: integer
      description: >-
        Rounded percentage of entities embedded (embedded / total * 100); 0 when
        there are no entities of this type.
      example: 75
  required:
    - entity_type
    - total
    - embedded
    - pending
    - embedded_percent

EmbeddingCoverageResponse:
  type: object
  description: >-
    Derived, team-scoped embedding coverage per entity type under the team's
    active provider model. Counts are computed from existing rows (no per-entity
    state); a non-decreasing pending count is the signal that embedding is stuck.
    When the team has no active provider, has_active_provider is false,
    active_model is null, and every type reports all entities as pending (0%).
  properties:
    has_active_provider:
      type: boolean
      description: Whether the team has an active embedding provider configured.
      example: true
    active_model:
      type: string
      nullable: true
      description: >-
        The active provider's embedding model the embedded counts are measured
        against, or null when no provider is configured.
      example: "text-embedding-3-small"
    coverage:
      type: array
      description: One entry per embeddable entity type, in a stable order.
      items:
        $ref: '../openapi.yaml#/components/schemas/EmbeddingCoverageItem'
  required:
    - has_active_provider
    - active_model
    - coverage
