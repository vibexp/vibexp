name: CI / Frontend

# CI for the standalone frontend (Vite + React + TypeScript). Every step
# delegates to a Makefile target (the make targets cd into frontend/
# themselves), so CI and local runs stay identical. No auth token is required.

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'Makefile'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'Makefile'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read

jobs:
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: make frontend-install

      - name: Lint
        run: make frontend-lint

      - name: Type-check
        run: make frontend-type-check

      - name: Test
        run: make frontend-test

      - name: Build
        run: make frontend-build
