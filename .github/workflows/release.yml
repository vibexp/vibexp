name: Release

# Builds and pushes the single combined VibeXP image (issue #61) to GitHub
# Container Registry when a GitHub Release is published with a `v*` tag
# (e.g. v0.1.0). The image (ghcr.io/vibexp/vibexp) embeds the built frontend SPA
# into the Go backend and serves both from one port — the one-command self-host
# model (`docker run ghcr.io/vibexp/vibexp`).
#
# This replaces the previous split backend/frontend release workflows: the
# frontend is no longer published as a separate image. Pushes
# ghcr.io/vibexp/vibexp:<version> and, for non-prereleases, :latest (which
# docker-compose.yml tracks).
#
# workflow_dispatch is a manual escape hatch: provide `version` to build/push
# from the current ref without a release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 0.1.0)'
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/vibexp/vibexp

jobs:
  release:
    name: Build & push combined image
    runs-on: ubuntu-latest
    # On a release, only run for v-prefixed tags; always run on dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Resolve version
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
          INPUT: ${{ inputs.version }}
        run: |
          version="${INPUT:-${TAG#v}}"
          if [ -z "$version" ]; then
            echo "::error::Could not resolve a version (tag '$TAG', input '$INPUT')."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building $IMAGE_NAME:$version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}

      # Build context is the repo root so the Dockerfile can build the frontend
      # SPA and embed it into the Go backend (see backend/Dockerfile).
      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_RELEASE_SHA=${{ github.sha }}
          provenance: true
