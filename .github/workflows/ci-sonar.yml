name: CI / SonarCloud

# Non-blocking SonarCloud (SonarQube) static analysis for the combined monorepo
# (issue #300). Builds Go + frontend coverage, then runs the SonarScanner
# against org `vibexp` / project `vibexp_vibexp` (config in the repo-root
# sonar-project.properties). The scan step is `continue-on-error: true` so a
# failing Quality Gate surfaces findings without blocking PRs or `main` while
# the existing debt is burned down.
#
# NOTE: CI-based analysis is mutually exclusive with SonarCloud Automatic
# Analysis. Automatic Analysis must be disabled for `vibexp_vibexp` in the
# SonarCloud UI (Administration -> Analysis Method) or the scan is rejected.

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Makefile'
      - 'sonar-project.properties'
      - '.github/workflows/ci-sonar.yml'
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Makefile'
      - 'sonar-project.properties'
      - '.github/workflows/ci-sonar.yml'

permissions:
  contents: read

jobs:
  sonar:
    name: Coverage & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Full history so SonarCloud can attribute new code / blame accurately.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Download backend dependencies
        run: make backend-download-deps

      # Generate coverage for both languages. These delegate to the same
      # Makefile targets used locally, so CI and local runs stay identical.
      - name: Backend coverage
        run: make backend-test-coverage  # -> backend/coverage.out

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Frontend coverage
        run: make frontend-test-coverage  # -> frontend/coverage/lcov.info

      # jest emits lcov SF: paths relative to frontend/ (its rootDir), but the
      # scanner runs from the repo root, so prefix them with frontend/ to make
      # them repo-root-relative and resolvable.
      - name: Rewrite frontend lcov paths to repo-root-relative
        run: sed -i 's#^SF:#SF:frontend/#' frontend/coverage/lcov.info

      # Fail loudly here rather than let Sonar silently ingest 0% coverage if a
      # report is missing (the monorepo coverage-path risk called out in #300).
      - name: Verify coverage reports exist
        run: |
          test -s backend/coverage.out || { echo "::error::backend/coverage.out missing or empty"; exit 1; }
          test -s frontend/coverage/lcov.info || { echo "::error::frontend/coverage/lcov.info missing or empty"; exit 1; }

      # Non-blocking: a red Quality Gate must not fail the workflow or block
      # merges while existing findings are progressively fixed.
      - name: SonarCloud scan
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
