name: CI / E2E

# Production-like end-to-end (Playwright) tests, run ON DEMAND only.
#
# This is intentionally NOT wired to pull_request/push: the suite builds the
# combined image from source and boots a full stack (Postgres + fake-gcs +
# backend serving the embedded SPA), which is too heavy to gate every PR. Run it
# manually from the Actions tab (or `gh workflow run ci-e2e.yml -f branch=<ref>`)
# against any branch. Everything delegates to `make e2e` so a green run here means
# the same `make e2e` is green locally.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch, tag, or SHA to run the e2e suite against'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E (${{ inputs.branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout ${{ inputs.branch }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: make frontend-install

      # `make e2e` installs the Playwright browser, builds + boots the stack via
      # docker-compose.e2e.yml, runs the suite, then always tears the stack down.
      - name: Run e2e suite
        run: make e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14
          if-no-files-found: warn
