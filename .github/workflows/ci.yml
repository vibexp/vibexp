name: CI

# Consolidated CI for the monorepo (issue #390, supersedes the self-contained
# ci-sonar design from #300): the backend and frontend test jobs produce
# coverage as a BY-PRODUCT of their single test execution and upload it as
# artifacts; the sonar job only downloads those artifacts and runs the scanner.
# No test suite runs twice.
#
# Path filtering happens in the `changes` job (dorny/paths-filter) instead of
# workflow-level `paths:` so one workflow can gate its jobs independently. On
# pushes to main every job runs unconditionally so the main-branch Sonar
# analysis always carries BOTH coverage reports (partial main analyses would
# swing overall coverage — the invariant #300 protected).
#
# The backend test job also runs the integration-tagged suite against a real
# Postgres service container, so integration-covered code finally counts in
# Sonar coverage (issue #390; previously local-only).
#
# NOTE: CI-based analysis is mutually exclusive with SonarCloud Automatic
# Analysis. Automatic Analysis must be disabled for `vibexp_vibexp` in the
# SonarCloud UI (Administration -> Analysis Method) or the scan is rejected.

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Makefile'
              - 'sonar-project.properties'
              - '.github/workflows/ci.yml'
              - '.github/linters/golangci.yml'
              - '.github/linters/spectral.yml'
            frontend:
              - 'frontend/**'
              - 'Makefile'
              - 'sonar-project.properties'
              - '.github/workflows/ci.yml'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'

    # Real Postgres for the integration-tagged tests; the harness auto-creates
    # and migrates the dedicated vibexp_io_test database via the /postgres
    # maintenance DB (see backend/internal/repositories/postgres/main_integration_test.go).
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: vibexp_app
          POSTGRES_PASSWORD: local_password
          POSTGRES_DB: vibexp_io
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: make backend-download-deps

      - name: gofmt check
        run: make backend-format

      - name: Build
        run: make backend-build

      # Regenerate config.schema.json from the Config struct and fail if it
      # drifts from the committed file (same gate as the other generated
      # artifacts) — keeps editor validation for config.yaml honest.
      - name: Check config schema drift
        run: make backend-config-schema-check

      # Single test execution: unit + integration-tagged tests together, with
      # coverage. Replaces the separate plain run here plus the duplicate
      # coverage run the old ci-sonar.yml performed.
      - name: Test (unit + integration, with coverage)
        run: make backend-test-coverage-integration

      # Guard against reintroducing WorkOS-specific coupling (removed in #30).
      # WorkOS may return only as generic OIDC_* configuration, never as
      # special-case code. Scoped to Go source so doc/config examples are unaffected.
      - name: Guard against WorkOS coupling
        run: |
          if grep -rniE 'workos' backend --include='*.go'; then
            echo "::error::WorkOS references found in backend Go source. The WorkOS provider was removed; re-add WorkOS only as generic OIDC_* configuration."
            exit 1
          fi
          echo "OK: no WorkOS coupling in backend Go source."

      - name: Upload backend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25.12'
          cache-dependency-path: backend/go.sum

      # make backend-lint invokes the golangci-lint binary directly, so install
      # it (pinned to match the v2 config in .github/linters/golangci.yml).
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        run: make backend-lint

  openapi:
    name: OpenAPI validation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      # make backend-validate-openapi shells out to `npx @apidevtools/swagger-cli`
      # which resolves and runs the validator on demand — no project install needed.
      - name: Validate OpenAPI specification
        run: make backend-validate-openapi

      # Regenerate the embedded bundle served at /openapi.{yaml,json} (#139) and
      # fail if it drifts from the committed files — same gate as the config
      # schema. Runs here (not Build & Test) because it needs Node/npx for redocly.
      - name: Check embedded OpenAPI bundle drift
        run: make backend-openapi-bundle-check

  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: make frontend-install

      - name: Lint
        run: make frontend-lint

      - name: Type-check
        run: make frontend-type-check

      # Single test execution WITH coverage (jest --coverage) — replaces the
      # plain `make frontend-test` here plus the duplicate coverage run the old
      # ci-sonar.yml performed.
      - name: Test (with coverage)
        run: make frontend-test-coverage

      - name: Build
        run: make frontend-build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 1

  sonar:
    name: Sonar Scan
    runs-on: ubuntu-latest
    needs: [changes, build-and-test, build-lint-test]
    # Run when at least one test job succeeded and none failed (skipped is
    # fine — a one-sided PR has no coverage for the other side, and PR analysis
    # gates on new code only). Never scan on red or cancelled tests.
    if: >-
      always() &&
      (needs.build-and-test.result == 'success' || needs.build-lint-test.result == 'success') &&
      needs.build-and-test.result != 'failure' && needs.build-and-test.result != 'cancelled' &&
      needs.build-lint-test.result != 'failure' && needs.build-lint-test.result != 'cancelled'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Full history so SonarCloud can attribute new code / blame accurately.
          fetch-depth: 0

      - name: Download backend coverage
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage

      # jest emits lcov SF: paths relative to frontend/ (its rootDir), but the
      # scanner runs from the repo root, so prefix them with frontend/ to make
      # them repo-root-relative and resolvable.
      - name: Rewrite frontend lcov paths to repo-root-relative
        run: |
          if [ -f frontend/coverage/lcov.info ]; then
            sed -i 's#^SF:#SF:frontend/#' frontend/coverage/lcov.info
          fi

      # Fail loudly rather than let Sonar silently ingest 0% coverage if a
      # report that SHOULD exist is missing (the monorepo coverage-path risk
      # called out in #300). A report is expected whenever its test job ran.
      - name: Verify expected coverage reports exist
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ]; then
            test -s backend/coverage.out || { echo "::error::backend/coverage.out missing or empty despite Build & Test succeeding"; exit 1; }
          fi
          if [ "${{ needs.build-lint-test.result }}" = "success" ]; then
            test -s frontend/coverage/lcov.info || { echo "::error::frontend/coverage/lcov.info missing or empty despite Build, Lint & Test succeeding"; exit 1; }
          fi

      # Non-blocking: a red Quality Gate must not fail the workflow or block
      # merges (flipping this is issue #371, gated on overall coverage >= 80%).
      - name: SonarCloud scan
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
