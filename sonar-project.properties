# SonarCloud (SonarQube) scanner configuration for the vibexp/vibexp monorepo.
#
# CI-based analysis (see .github/workflows/ci-sonar.yml), NOT SonarCloud
# Automatic Analysis: this is a Go + React/TS monorepo and we want test
# coverage ingested, which Automatic Analysis cannot do. The two modes are
# mutually exclusive, so Automatic Analysis must be turned OFF for this project
# in the SonarCloud UI or CI analysis is rejected (issue #300).

sonar.organization=vibexp
sonar.projectKey=vibexp_vibexp

# --- Sources & tests (monorepo: Go backend + React/TS frontend) ---
# backend/ and frontend/src hold both production and test files; the
# test.inclusions below classify which are tests so the rest are analyzed as
# main sources (a file is never indexed as both).
sonar.sources=backend,frontend/src
sonar.tests=backend,frontend/src,frontend/tests
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,frontend/tests/**

# --- Coverage reports ---
# Go profile paths are module-qualified (github.com/vibexp/vibexp/...) and
# resolved via backend/go.mod. The frontend lcov emits SF: paths relative to
# frontend/ (jest rootDir); ci-sonar.yml rewrites them to be repo-root-relative
# so the scanner (which runs from the repo root) can map them.
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# --- Exclusions: generated code and build output are neither analyzed nor
# counted toward coverage (see CLAUDE.md — *_gen.go / mock_*.go / wire_gen.go
# are committed generated artifacts). backend/migrations/** is excluded because
# those are PostgreSQL DDL files, but Sonar's SQL analyzer is Oracle PL/SQL —
# analyzing them yields false positives (and the "Data Dictionary not
# configured for the PLSQL analyzer" warning). ---
sonar.exclusions=**/*_gen.go,**/*.gen.go,**/mocks/mock_*.go,**/wire_gen.go,backend/migrations/**,frontend/dist/**,frontend/coverage/**
# Test-support and glue packages stay in sonar.sources (statically analyzed)
# but are excluded from COVERAGE measurement (issue #359): plain
# `go test -coverprofile` (no -coverpkg) only credits a package's own tests,
# so packages exercised solely by other packages' tests report near-zero
# coverage despite running in every CI build. testutils/a2atest/specconformance
# are test infrastructure; container is Wire DI glue; cmd is cobra glue.
sonar.coverage.exclusions=**/*_gen.go,**/*.gen.go,**/mocks/mock_*.go,**/wire_gen.go,**/*_test.go,frontend/tests/**,backend/internal/testutils/**,backend/internal/services/a2atest/**,backend/internal/specconformance/**,backend/internal/container/**,backend/cmd/**
