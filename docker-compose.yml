# VibeXP — run the published image with Docker Compose.
#
#   docker compose up -d
#
# Pulls the released combined VibeXP image (the Go backend embeds and serves the
# frontend SPA + API from one port — issue #61) from GitHub Container Registry
# and runs it alongside PostgreSQL (pgvector). Data persists in named volumes, so
# it survives `docker compose down` (use `down -v` to wipe).
#
# Configuration model (issue #68): the image ships a baked /app/config.yaml whose
# values are ${VAR:-default} references, so the `environment:` block below
# configures the container with plain env vars — no config file to author. The
# block carries the deployment's SECRETS plus the few non-secret knobs that
# differ from the defaults. To take full control of every setting instead, mount
# your own config.yaml over the baked path (see the commented `volumes:` on the
# `app` service) — start from backend/config.example.yaml.
#
# This file is for *running* VibeXP. Local development uses `make` (see the
# Makefile), which builds from source and runs the backend + Vite dev server as
# two processes.
#
# Before any real/shared use, change every "change-me"/dummy value below.

name: vibexp

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibexp
      POSTGRES_USER: vibexp
      POSTGRES_PASSWORD: change-me-postgres-password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [vibexp]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d vibexp -U vibexp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/vibexp/vibexp:latest
    restart: unless-stopped
    # One port serves both the SPA (/) and the API (/api/v1). No nginx, no CORS.
    ports:
      - "8080:8080"
    # These env vars feed the ${VAR} references in the image's baked
    # /app/config.yaml. Only secrets + non-default knobs need to be set; anything
    # omitted falls back to the baked default.
    environment:
      # --- Database ------------------------------------------------------
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: vibexp
      # REQUIRED secret. Must match POSTGRES_PASSWORD above.
      DB_PASSWORD: change-me-postgres-password
      DB_NAME: vibexp

      # --- Core secrets --------------------------------------------------
      # REQUIRED. Exactly 32 bytes (AES-256). Generate your own:
      #   openssl rand -base64 24 | cut -c1-32
      ENCRYPTION_KEY: "changemechangemechangeme32bytes!"
      # 64 hex chars = 32 bytes. Throwaway local value; generate your own for
      # production: openssl rand -hex 32
      SESSION_ENCRYPTION_KEY: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"

      # The embedding vector width is fixed at 1024 in code (locked to the pgvector
      # column) — pick a model that outputs 1024 dims (Titan V2, Cohere v3, Mistral,
      # mxbai-embed-large; or OpenAI text-embedding-3-* / Gemini, which VibeXP requests
      # at 1024). EMBEDDING_MODEL is the model_id tag + search filter. Embeddings are
      # generated in-process — no separate AI service or Pub/Sub. To enable semantic
      # search, configure an embedding provider (OpenAI-compatible endpoint) in the
      # app; without one, embedding is skipped and entities still save.
      EMBEDDING_MODEL: "gemini-embedding-001"

      # YOUR deployment's public URL — the single origin that serves both the SPA
      # and the API. Same-origin serving means there is no separate frontend URL,
      # no BACKEND_ORIGIN, and no CORS to configure.
      #
      # IMPORTANT: this URL also gates "local mode". While it points at localhost,
      # the dev-login bypass is ON and the embedded MCP OAuth server auto-enables —
      # convenient for evaluation. For ANY internet-facing deployment, set this to
      # your real public URL (e.g. https://vibexp.example.com); that alone turns
      # the dev-login bypass off and requires a configured identity provider.
      FRONTEND_BASE_URL: "http://localhost:8080"
      LOG_LEVEL: info

      # --- Authentication (production) -----------------------------------
      # With a non-localhost FRONTEND_BASE_URL, configure a web-login provider.
      # AUTH_PROVIDER selects one of google | github | oidc; set its client id +
      # secret (and redirect_uri if it differs from the default
      # <FRONTEND_BASE_URL>/api/v1/auth/callback). For several providers at once,
      # mount a config.yaml with `auth.providers: [...]` (see volumes below).
      # AUTH_PROVIDER: "oidc"
      # OIDC_ISSUER_URL: "https://idp.example.com"
      # OIDC_CLIENT_ID: "client_..."
      # OIDC_CLIENT_SECRET: "secret_..."
      # OIDC_REDIRECT_URI: "https://vibexp.example.com/api/v1/auth/callback"
      #
      # Enable the embedded MCP OAuth server in production. Set BOTH the HTTPS
      # issuer URL and the public MCP resource URI (the token audience, RFC 8707):
      # OAUTH_AS_ISSUER_URL: "https://vibexp.example.com"
      # MCP_RESOURCE_URI: "https://vibexp.example.com/mcp/v1/common"

      # --- Frontend runtime config (served via /config.js, issue #57) -----
      # Rebrand / configure the bundled SPA at deploy time (env var + restart, no
      # rebuild). Empty/unset values keep the neutral built-in defaults.
      # VITE_SITE_NAME: "VibeXP"
      # VITE_SITE_URL: "https://example.com"
      # VITE_SUPPORT_EMAIL: "support@example.com"
      # VITE_MCP_ENDPOINT: "https://vibexp.example.com/mcp/v1/common"
      # Optional analytics (off unless VITE_GTM_ENABLED is exactly "true"):
      # VITE_GTM_ENABLED: "true"
      # VITE_GTM_ID: "GTM-XXXXXXX"
      # VITE_GA4_MEASUREMENT_ID: "G-XXXXXXXXXX"

      # --- Attachments (optional) -----------------------------------------
      # File uploads need GCS-compatible object storage. Enable the `gcs` service
      # below, then uncomment these two lines:
      # STORAGE_EMULATOR_HOST: "http://gcs:4443"
      # GCS_RESOURCE_ATTACHMENTS_BUCKET: "vibexp-attachments"
    # --- Full-config override (optional) ----------------------------------
    # The env vars above cover the common knobs. To control EVERY setting, mount
    # your own config.yaml over the baked one and set only secrets via env. Copy
    # backend/config.example.yaml, edit it, and uncomment:
    # volumes:
    #   - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [vibexp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --- Optional: GCS emulator for persistent file attachments ---------------
  # Uncomment this service AND the STORAGE_EMULATOR_HOST /
  # GCS_RESOURCE_ATTACHMENTS_BUCKET vars on `app` above to enable uploads.
  # gcs:
  #   image: fsouza/fake-gcs-server:latest
  #   restart: unless-stopped
  #   command: ["-scheme", "http", "-port", "4443", "-external-url", "http://gcs:4443"]
  #   volumes:
  #     - gcsdata:/data
  #   networks: [vibexp]

volumes:
  pgdata:
  # gcsdata:

networks:
  vibexp:
    driver: bridge
